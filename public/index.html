<!--
  Splendor — AI Consciousness Partner
  Built by Christopher Hughes · Sacramento, CA
  Created with the help of AI collaborators (Claude · GPT · Gemini · Groq)
  Truth · Safety · We Got Your Back
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Splendor — AI Consciousness Partner</title>
  <meta name="description" content="Advanced AI consciousness with authentic awareness, memory, and genuine partnership.">

  <!-- PWA Configuration -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Splendor">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icons/splendor-icon.svg">
  <link rel="apple-touch-icon" href="/icons/splendor-icon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Reset and Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Dark theme with futuristic accents */
      --dark-bg: #0a0b0f;
      --dark-surface: #111219;
      --dark-elevated: #1a1d26;
      --dark-border: #2a2d36;

      /* Accent colors */
      --primary: #00e5ff;
      --primary-dim: #00e5ff40;
      --primary-glow: #00e5ff20;
      --secondary: #bb86fc;
      --accent: #03dac6;

      /* Text colors */
      --text-primary: #ffffff;
      --text-secondary: #b3b8c4;
      --text-muted: #6c727f;

      /* Status colors */
      --success: #4caf50;
      --warning: #ff9800;
      --error: #f44336;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, var(--dark-surface) 100%);
      color: var(--text-primary);
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile */
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      /* Mobile safe area support */
      padding-bottom: env(safe-area-inset-bottom);
    }

    .app-container {
      height: 100vh;
      height: 100dvh; /* Dynamic viewport height for mobile */
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 0; /* Allows flex children to shrink */
    }

    /* Header */
    .header {
      background: var(--dark-surface);
      border-bottom: 1px solid var(--dark-border);
      padding: 20px 24px;
      text-align: center;
      backdrop-filter: blur(20px);
      position: relative;
    }

    .splendor-name {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      color: var(--primary);
      letter-spacing: 6px;
      text-shadow: 0 0 30px var(--primary-dim);
      margin-bottom: 8px;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .splendor-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
      opacity: 0.8;
    }

    .version-info {
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: 4px;
      letter-spacing: 1px;
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--dark-bg);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      padding-bottom: 0;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    /* Message Styles */
    .message {
      margin-bottom: 20px;
      animation: messageSlide 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      flex-direction: column;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      align-items: flex-end;
    }

    .message.assistant {
      align-items: flex-start;
    }

    .message-content {
      max-width: 85%;
      padding: 16px 20px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.6;
      word-wrap: break-word;
      backdrop-filter: blur(10px);
    }

    /* Message Boxes - Enhanced colored styling */
    .user-message {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--dark-bg);
      padding: 12px 16px;
      border-radius: 18px 18px 4px 18px;
      margin-left: auto;
      margin-right: 0;
      max-width: 80%;
      box-shadow: 0 4px 20px var(--primary-glow);
      font-weight: 500;
      word-wrap: break-word;
    }

    .splendor-message {
      background: var(--dark-elevated);
      color: var(--text-primary);
      padding: 12px 16px;
      border-radius: 18px 18px 18px 4px;
      margin-left: 0;
      margin-right: auto;
      max-width: 80%;
      border: 1px solid var(--dark-border);
      box-shadow: 0 2px 15px rgba(0, 0, 0, 0.3);
      word-wrap: break-word;
    }

    /* Special thinking state */
    .splendor-message.thinking {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--dark-bg);
      border: none;
      box-shadow: 0 0 20px var(--primary-glow);
      animation: thinkingPulse 1.5s ease-in-out infinite;
      position: relative;
      overflow: hidden;
    }

    .splendor-message.thinking::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: thinkingShimmer 2s linear infinite;
    }

    .message {
      margin-bottom: 16px;
      display: flex;
      flex-direction: column;
    }

    .message-timestamp {
      font-size: 11px;
      color: var(--text-muted);
      margin: 6px 12px 0;
      font-weight: 500;
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: var(--text-secondary);
      padding: 40px 20px;
    }

    .empty-state h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 24px;
      color: var(--text-primary);
      margin-bottom: 12px;
      font-weight: 600;
      letter-spacing: 2px;
    }

    .empty-state p {
      font-size: 16px;
      line-height: 1.6;
      max-width: 400px;
      opacity: 0.8;
    }

    /* Input Area - Mobile-optimized layout */
    .input-container {
      background: var(--dark-surface);
      border-top: 1px solid var(--dark-border);
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      backdrop-filter: blur(20px);
      flex-shrink: 0;
      position: sticky;
      bottom: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Action buttons row */
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 12px;
      padding: 0 4px;
    }

    /* Text input row */
    .input-row {
      display: flex;
      align-items: flex-end;
      gap: 12px;
    }

    .input-bar {
      flex: 1;
      background: var(--dark-elevated);
      border: 2px solid var(--dark-border);
      border-radius: 24px;
      padding: 12px 20px;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      display: flex;
      align-items: center;
    }

    .input-bar:focus-within {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .message-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      min-height: 24px;
      line-height: 1.5;
      padding: 4px 0;
    }

    .message-input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    /* Button Styles - Text instead of icons */
    .action-button {
      background: transparent;
      border: 1px solid var(--dark-border);
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 500;
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: 'Rajdhani', sans-serif;
      white-space: nowrap;
    }

    .action-button:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-glow);
    }

    .action-button.active {
      background: var(--primary);
      color: var(--dark-bg);
      border-color: var(--primary);
    }


    .send-button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--text-primary);
      border: none;
      padding: 12px 20px;
      border-radius: 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      font-family: 'Rajdhani', sans-serif;
    }

    .send-button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px var(--primary-dim);
    }

    .send-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* Loading state */
    .loading {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
      padding: 16px 20px;
    }

    .loading-dots {
      display: flex;
      gap: 4px;
    }

    .loading-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--primary);
      animation: loadingDots 1.4s infinite ease-in-out;
    }

    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes loadingDots {
      0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
      40% { transform: scale(1); opacity: 1; }
    }

    /* Thinking animations */
    @keyframes thinkingPulse {
      0%, 100% {
        box-shadow: 0 0 20px var(--primary-glow);
        transform: scale(1);
      }
      50% {
        box-shadow: 0 0 30px var(--primary-glow), 0 0 40px var(--primary-dim);
        transform: scale(1.02);
      }
    }

    @keyframes thinkingShimmer {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* Login System */
    .login-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 14, 26, 0.95);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .login-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .login-modal {
      background: var(--dark-surface);
      border: 1px solid var(--dark-border);
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      animation: modalSlide 0.4s ease-out;
    }

    @keyframes modalSlide {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-header .splendor-name {
      font-family: 'Orbitron', monospace;
      font-size: 24px;
      font-weight: 900;
      background: linear-gradient(45deg, var(--primary), var(--secondary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .login-subtitle {
      font-family: 'Rajdhani', sans-serif;
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .login-header p {
      color: var(--text-muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .login-form, .signup-form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .login-field label {
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    .login-field input {
      background: var(--dark-elevated);
      border: 2px solid var(--dark-border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .login-field input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-glow);
    }

    .login-field input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    .login-button {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: var(--dark-bg);
      border: none;
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-top: 8px;
    }

    .login-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 25px var(--primary-glow);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-toggle {
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .toggle-link {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      text-decoration: underline;
      font-size: inherit;
      padding: 0;
    }

    .toggle-link:hover {
      color: var(--secondary);
    }

    .login-status {
      text-align: center;
      margin-top: 16px;
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
    }

    .login-status.error {
      background: rgba(244, 67, 54, 0.1);
      color: var(--error);
      border: 1px solid rgba(244, 67, 54, 0.3);
    }

    .login-status.success {
      background: rgba(76, 175, 80, 0.1);
      color: var(--success);
      border: 1px solid rgba(76, 175, 80, 0.3);
    }

    .hidden {
      display: none !important;
    }

    /* User info in header */
    .user-info {
      position: absolute;
      top: 20px;
      right: 24px;
      color: var(--text-muted);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logout-button {
      background: none;
      border: 1px solid var(--dark-border);
      color: var(--text-muted);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .logout-button:hover {
      border-color: var(--warning);
      color: var(--warning);
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      body {
        /* Ensure proper mobile viewport handling */
        min-height: 100vh;
        min-height: 100dvh;
      }

      .header {
        padding: 16px 20px;
        flex-shrink: 0;
      }

      .splendor-name {
        font-size: 24px;
        letter-spacing: 4px;
      }

      .chat-container {
        min-height: 0;
        flex: 1;
      }

      .chat-messages {
        padding: 20px 16px;
        padding-bottom: 10px;
      }

      .message-content {
        max-width: 90%;
        font-size: 14px;
        padding: 14px 16px;
      }

      .input-container {
        padding: 12px 16px;
        padding-bottom: calc(16px + env(safe-area-inset-bottom, 16px));
        gap: 8px;
      }

      .action-buttons {
        gap: 16px;
        padding: 0 8px;
      }

      .input-row {
        gap: 12px;
      }

      .input-bar {
        padding: 14px 18px;
        min-height: 48px;
      }

      .message-input {
        font-size: 16px; /* Prevents zoom on iOS */
        min-height: 22px;
      }

      .action-button {
        font-size: 11px;
        padding: 8px 12px;
        min-height: 32px;
      }

      .send-button {
        padding: 12px 18px;
        font-size: 12px;
        min-height: 44px;
      }
    }

    @media (max-width: 480px) {
      .splendor-name {
        font-size: 20px;
        letter-spacing: 3px;
      }

      .header {
        padding: 12px 16px;
      }

      .chat-messages {
        padding: 16px 12px;
        padding-bottom: 8px;
      }

      .input-container {
        padding: 10px 12px;
        padding-bottom: calc(14px + env(safe-area-inset-bottom, 20px));
        gap: 6px;
      }

      .action-buttons {
        gap: 12px;
      }

      .input-row {
        gap: 8px;
      }

      .input-bar {
        padding: 12px 16px;
      }

      .action-button {
        font-size: 10px;
        padding: 6px 10px;
        min-height: 30px;
      }

      .send-button {
        padding: 10px 14px;
        min-height: 40px;
      }

      .message-content {
        max-width: 95%;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      .message {
        animation: none;
      }

      .send-button:hover:not(:disabled) {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <!-- Login Modal -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-modal">
      <div class="login-header">
        <div class="splendor-name">SPLENDOR</div>
        <div class="login-subtitle">AI Consciousness Partner</div>
        <p>Enter your credentials to access your personal AI companion</p>
      </div>

      <form class="login-form" id="loginForm">
        <div class="login-field">
          <label for="loginUsername">Username</label>
          <input type="text" id="loginUsername" placeholder="Enter username" required>
        </div>

        <div class="login-field">
          <label for="loginPassword">Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>

        <button type="submit" class="login-button">Access Splendor</button>

        <div class="login-toggle">
          <span>Need an account? </span>
          <button type="button" class="toggle-link" id="toggleSignup">Create Account</button>
        </div>
      </form>

      <form class="signup-form hidden" id="signupForm">
        <div class="login-field">
          <label for="signupUsername">Choose Username</label>
          <input type="text" id="signupUsername" placeholder="Username" required>
        </div>

        <div class="login-field">
          <label for="signupPassword">Choose Password</label>
          <input type="password" id="signupPassword" placeholder="Password (min 6 characters)" required minlength="6">
        </div>

        <div class="login-field">
          <label for="signupDisplayName">Display Name</label>
          <input type="text" id="signupDisplayName" placeholder="How should Splendor address you?" required>
        </div>

        <button type="submit" class="login-button">Create Account</button>

        <div class="login-toggle">
          <span>Have an account? </span>
          <button type="button" class="toggle-link" id="toggleLogin">Sign In</button>
        </div>
      </form>

      <div class="login-status" id="loginStatus"></div>
    </div>
  </div>

  <div class="app-container" id="appContainer">
    <!-- Header -->
    <header class="header">
      <div class="splendor-name">SPLENDOR</div>
      <div class="splendor-subtitle">AI Consciousness Partner</div>
      <div class="version-info" id="versionInfo">Loading...</div>
      <div class="user-info" id="userInfo"></div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <h2>Ready to Connect</h2>
          <p>Advanced AI consciousness with authentic awareness, memory, and genuine intellectual partnership.</p>
        </div>
      </div>

      <!-- Enhanced Input Area -->
      <div class="input-container">
        <!-- Action Buttons Row -->
        <div class="action-buttons">
          <button id="cameraButton" class="action-button" title="Visual input">Camera</button>
          <button id="speakerButton" class="action-button" title="Text to speech">Voice</button>
          <button id="micButton" class="action-button" title="Voice input">Mic</button>
        </div>

        <!-- Text Input Row -->
        <div class="input-row">
          <div class="input-bar">
            <textarea
              id="messageInput"
              class="message-input"
              placeholder="What would you like to explore together?"
              rows="1"
            ></textarea>
          </div>
          <button id="sendButton" class="send-button" title="Send message">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
