<!--
  Splendor — The Remarkable AI · The Good Neighbor Guard
  Built by Christopher Hughes · Sacramento, CA
  Created with the help of AI collaborators (Claude · GPT · Gemini · Groq)
  Truth · Safety · We Got Your Back
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Splendor — The Remarkable AI</title>
  <meta name="description" content="Your AI partner that remembers, thinks with you, and tells the truth.">

  <!-- PWA Configuration -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0e1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Splendor">

  <!-- Icons -->
  <link rel="icon" type="image/svg+xml" href="/icons/splendor-icon.svg">
  <link rel="apple-touch-icon" href="/icons/splendor-icon.svg">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Reset and Base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --navy: #0a0e1a;
      --navy-mid: #111827;
      --navy-light: #1a2236;
      --teal: #00c9b1;
      --teal-dim: #00c9b140;
      --teal-glow: #00c9b120;
      --white: #f0f4f8;
      --white-dim: #a0aec0;
      --gold: #f6c90e;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--navy);
      color: var(--white);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      min-height: 100dvh;
      position: relative;
    }

    /* Subtle background texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* App Container */
    .app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      min-height: 100dvh;
      max-width: 100vw;
      overflow: hidden;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid var(--teal-dim);
      background: var(--navy);
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }

    .splendor-name {
      font-family: 'Orbitron', monospace;
      font-size: 22px;
      font-weight: 700;
      color: var(--teal);
      letter-spacing: 4px;
      text-shadow: 0 0 20px var(--teal-dim);
      margin-bottom: 2px;
    }

    .splendor-tagline {
      font-family: 'Rajdhani', sans-serif;
      font-size: 11px;
      color: var(--white-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Chat Container */
    .chat-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      padding-bottom: 0;
      -webkit-overflow-scrolling: touch;
      scroll-behavior: smooth;
    }

    /* Message Styles */
    .message {
      margin-bottom: 16px;
      animation: messageSlide 0.4s ease-out;
      display: flex;
      flex-direction: column;
    }

    @keyframes messageSlide {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .splendor-message {
      background: var(--navy-light);
      border-left: 3px solid var(--teal);
      border-radius: 0 12px 12px 0;
      padding: 16px 20px;
      margin: 8px 0 8px 0;
      max-width: 85%;
      font-family: 'Lora', serif;
      font-size: 15px;
      line-height: 1.7;
      color: var(--white);
      box-shadow: 0 0 20px var(--teal-glow);
      align-self: flex-start;
    }

    .user-message {
      background: var(--navy-mid);
      border-right: 3px solid var(--white-dim);
      border-radius: 12px 0 0 12px;
      padding: 12px 16px;
      margin: 8px 0 8px auto;
      max-width: 75%;
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      color: var(--white-dim);
      text-align: right;
      font-weight: 500;
      align-self: flex-end;
    }

    .message-time {
      font-size: 10px;
      color: var(--white-dim);
      opacity: 0.6;
      margin-top: 4px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 400;
      letter-spacing: 0.5px;
    }

    .splendor-message + .message-time {
      align-self: flex-start;
      margin-left: 8px;
    }

    .user-message + .message-time {
      align-self: flex-end;
      margin-right: 8px;
      text-align: right;
    }

    /* Thinking Indicator */
    .thinking-container {
      display: flex;
      align-self: flex-start;
      margin: 8px 0;
    }

    .thinking {
      display: flex;
      gap: 6px;
      padding: 16px 20px;
      align-items: center;
      background: var(--navy-light);
      border-left: 3px solid var(--teal);
      border-radius: 0 12px 12px 0;
      box-shadow: 0 0 20px var(--teal-glow);
    }

    .thinking-dot {
      width: 6px;
      height: 6px;
      background: var(--teal);
      border-radius: 50%;
      animation: think 1.4s infinite;
    }

    .thinking-dot:nth-child(2) { animation-delay: 0.2s; }
    .thinking-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes think {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Empty State */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      color: var(--white-dim);
    }

    .empty-state h2 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      color: var(--white);
      margin-bottom: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .empty-state p {
      font-family: 'Lora', serif;
      font-size: 0.95rem;
      line-height: 1.7;
      max-width: 300px;
      opacity: 0.8;
    }

    /* Input Area */
    .input-bar {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 16px;
      background: var(--navy);
      border-top: 1px solid var(--teal-dim);
      position: sticky;
      bottom: 0;
      z-index: 100;
    }

    .message-input {
      flex: 1;
      background: var(--navy-light);
      border: 1px solid var(--teal-dim);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--white);
      font-family: 'Rajdhani', sans-serif;
      font-size: 15px;
      font-weight: 500;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.4;
    }

    .message-input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 12px var(--teal-glow);
    }

    .message-input::placeholder {
      color: var(--white-dim);
      opacity: 0.7;
    }

    .send-button {
      width: 44px;
      height: 44px;
      background: var(--teal);
      border: none;
      border-radius: 50%;
      color: var(--navy);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
      font-weight: 700;
    }

    .send-button:hover {
      transform: scale(1.08);
      box-shadow: 0 0 16px var(--teal-dim);
    }

    .send-button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .mic-button {
      width: 44px;
      height: 44px;
      background: transparent;
      border: 1px solid var(--teal-dim);
      border-radius: 50%;
      color: var(--teal);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .mic-button:hover {
      border-color: var(--teal);
      background: var(--teal-glow);
    }

    .mic-button.listening {
      background: var(--teal);
      color: var(--navy);
      border-color: var(--teal);
      box-shadow: 0 0 20px var(--teal);
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px var(--teal); }
      50% { box-shadow: 0 0 35px var(--teal); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .header {
        padding: 16px 20px 12px;
      }

      .splendor-name {
        font-size: 20px;
        letter-spacing: 3px;
      }

      .splendor-tagline {
        font-size: 10px;
      }

      .chat-messages {
        padding: 16px;
      }

      .splendor-message {
        padding: 14px 18px;
        font-size: 14px;
      }

      .user-message {
        padding: 10px 14px;
        font-size: 14px;
      }

      .input-bar {
        padding: 12px;
      }

      .message-input {
        font-size: 14px;
        padding: 10px 14px;
      }
    }

    /* Accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }

    /* Status indicators */
    .status-indicator {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--teal);
      box-shadow: 0 0 8px var(--teal);
      z-index: 1000;
      animation: statusPulse 2s infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="status-indicator" id="statusIndicator"></div>

  <div class="app" id="app">
    <!-- Header -->
    <header class="header">
      <div class="splendor-name">SPLENDOR</div>
      <div class="splendor-tagline">The Remarkable AI</div>
    </header>

    <!-- Chat Container -->
    <div class="chat-container">
      <div class="chat-messages" id="chatMessages">
        <!-- Empty State -->
        <div class="empty-state" id="emptyState">
          <h2>I'm present</h2>
          <p>Your AI partner that remembers, thinks with you, and tells the truth.</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-bar">
        <textarea
          id="messageInput"
          class="message-input"
          placeholder="What's on your mind?"
          rows="1"
        ></textarea>
        <button id="micButton" class="mic-button" title="Voice input">🎤</button>
        <button id="sendButton" class="send-button" title="Send message">→</button>
      </div>
    </div>
  </div>

  <script>
    /*
      Splendor — The Remarkable AI · The Good Neighbor Guard
      Built by Christopher Hughes · Sacramento, CA
      Created with the help of AI collaborators (Claude · GPT · Gemini · Groq)
      Truth · Safety · We Got Your Back
    */

    // Global variables
    let userId = null;
    let isRecording = false;
    let recognition = null;
    let chatMessages, messageInput, sendButton, micButton, emptyState;

    // Helper functions
    function getUserId() {
      let id = localStorage.getItem('splendor_user_id');
      if (!id) {
        id = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        localStorage.setItem('splendor_user_id', id);
      }
      return id;
    }

    function getLastMessageDate() {
      const lastDate = localStorage.getItem('splendor_last_message');
      return lastDate ? new Date(lastDate) : null;
    }

    function setLastMessageDate() {
      localStorage.setItem('splendor_last_message', new Date().toISOString());
    }

    function isFirstMessageToday() {
      const now = new Date();
      const today = now.toDateString();
      const lastMessageToday = getLastMessageDate();

      if (!lastMessageToday) return true;

      const lastDateString = lastMessageToday.toDateString();
      return lastDateString !== today;
    }

    function adjustTextareaHeight() {
      messageInput.style.height = 'auto';
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
    }

    function hideEmptyState() {
      if (emptyState) {
        emptyState.style.display = 'none';
      }
    }

    function scrollToBottom() {
      setTimeout(() => {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }, 100);
    }

    function appendMessage(sender, content) {
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message';

      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = sender === 'splendor' ? 'splendor-message' : 'user-message';
      bubbleDiv.textContent = content;

      const timeDiv = document.createElement('div');
      timeDiv.className = 'message-time';
      timeDiv.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

      messageDiv.appendChild(bubbleDiv);
      messageDiv.appendChild(timeDiv);
      chatMessages.appendChild(messageDiv);

      scrollToBottom();
    }

    function showThinking() {
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'thinking-container';
      thinkingDiv.id = 'thinkingIndicator';

      const bubbleDiv = document.createElement('div');
      bubbleDiv.className = 'thinking';

      for (let i = 0; i < 3; i++) {
        const dot = document.createElement('div');
        dot.className = 'thinking-dot';
        bubbleDiv.appendChild(dot);
      }

      thinkingDiv.appendChild(bubbleDiv);
      chatMessages.appendChild(thinkingDiv);

      scrollToBottom();
    }

    function hideThinking() {
      const thinking = document.getElementById('thinkingIndicator');
      if (thinking) {
        thinking.remove();
      }
    }

    async function fetchSplendorResponse(message) {
      try {
        const response = await fetch('/api/chat', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            message,
            userId: userId
          }),
        });

        const data = await response.json();

        if (data.error) {
          appendMessage('splendor', 'Something went wrong — try again in a moment.');
        } else {
          appendMessage('splendor', data.message);
        }
      } catch (error) {
        console.error('Chat error:', error);
        appendMessage('splendor', 'I\'m having trouble connecting right now — try again in a moment.');
      } finally {
        hideThinking();
        sendButton.disabled = false;
        messageInput.focus();
      }
    }

    function sendMessage() {
      const message = messageInput.value.trim();
      if (!message) {
        console.log('No message to send');
        return;
      }

      console.log('Sending message:', message);

      appendMessage('user', message);
      messageInput.value = '';
      adjustTextareaHeight();
      hideEmptyState();
      setLastMessageDate();

      showThinking();
      sendButton.disabled = true;

      fetchSplendorResponse(message);
    }

    function toggleVoiceInput() {
      console.log('Toggle voice input called');

      if (!recognition) {
        console.log('Voice recognition not supported');
        return;
      }

      if (isRecording) {
        recognition.stop();
        isRecording = false;
        micButton.classList.remove('listening');
        console.log('Stopped recording');
      } else {
        try {
          recognition.start();
          isRecording = true;
          micButton.classList.add('listening');
          console.log('Started recording');
        } catch (error) {
          console.error('Voice recognition start error:', error);
          isRecording = false;
          micButton.classList.remove('listening');
        }
      }
    }

    function initVoiceRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

      if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onresult = (event) => {
          const transcript = Array.from(event.results)
            .map(result => result[0].transcript)
            .join('');
          messageInput.value = transcript;
          adjustTextareaHeight();
        };

        recognition.onend = () => {
          isRecording = false;
          micButton.classList.remove('listening');
          // Auto-send if there's content
          if (messageInput.value.trim()) {
            setTimeout(() => sendMessage(), 500);
          }
        };

        recognition.onerror = (event) => {
          console.error('Speech error:', event.error);
          isRecording = false;
          micButton.classList.remove('listening');
        };

        console.log('Voice recognition initialized');
      } else {
        // Hide mic button if not supported
        micButton.style.display = 'none';
        console.log('Voice recognition not supported');
      }
    }

    async function checkMorningGreeting() {
      const now = new Date();
      const hour = now.getHours();

      // Check if it's morning (5am-10am) and first visit today
      if (hour >= 5 && hour <= 10 && isFirstMessageToday()) {
        try {
          const response = await fetch(`/api/chat/morning/${userId}`);
          const data = await response.json();

          if (data.message) {
            appendMessage('splendor', data.message);
            hideEmptyState();
          }
        } catch (error) {
          console.error('Morning greeting error:', error);
        }
      }
    }

    // Initialize everything when DOM is ready
    document.addEventListener('DOMContentLoaded', () => {
      console.log('DOM loaded, initializing Splendor...');

      // Initialize global variables
      userId = getUserId();
      chatMessages = document.getElementById('chatMessages');
      messageInput = document.getElementById('messageInput');
      sendButton = document.getElementById('sendButton');
      micButton = document.getElementById('micButton');
      emptyState = document.getElementById('emptyState');

      console.log('Elements found:', {
        chatMessages: !!chatMessages,
        messageInput: !!messageInput,
        sendButton: !!sendButton,
        micButton: !!micButton,
        emptyState: !!emptyState
      });

      // Add event listeners
      if (sendButton) {
        sendButton.addEventListener('click', (e) => {
          console.log('Send button clicked');
          e.preventDefault();
          sendMessage();
        });
      }

      if (messageInput) {
        messageInput.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) {
            console.log('Enter key pressed');
            e.preventDefault();
            sendMessage();
          }
        });

        messageInput.addEventListener('input', () => {
          adjustTextareaHeight();
        });
      }

      if (micButton) {
        micButton.addEventListener('click', (e) => {
          console.log('Mic button clicked');
          e.preventDefault();
          toggleVoiceInput();
        });
      }

      // Initialize voice recognition
      initVoiceRecognition();

      // Check for morning greeting
      checkMorningGreeting();

      console.log('Splendor initialized successfully');
    });

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then((registration) => {
            console.log('SW registered: ', registration);
          })
          .catch((registrationError) => {
            console.log('SW registration failed: ', registrationError);
          });
      });
    }
  </script>
</body>
</html>
