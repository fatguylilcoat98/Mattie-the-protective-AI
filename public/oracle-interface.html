<!--
  Splendor Oracle Interface
  3-column responsive grid: PROVENANCE STREAM · Neural Orb · COGNITIVE PULSE
  All panels wired to live backend endpoints:
    /api/oracle/memories/recent  → provenance stream
    /api/oracle/events/recent    → cognitive pulse
    /api/enhanced/chat           → conversation
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Splendor Oracle Interface</title>
  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Resolve bare "three" imports used by the post-processing addons. -->
  <script type="importmap">
    {
      "imports": {
        "three": "/lib/three.module.min.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(ellipse at center, #0a1428 0%, #040810 60%, #02040a 100%);
      color: #ffffff;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .oracle-main {
      display: grid;
      grid-template-columns: 22% 1fr 22%;
      grid-template-rows: 64px 1fr auto;
      grid-template-areas:
        "header header header"
        "provenance canvas cognitive"
        "console console console";
      height: 100vh; height: 100dvh;
      width: 100vw;
      position: relative; z-index: 1;
    }

    /* Header */
    .claspion-governance {
      grid-area: header;
      background: linear-gradient(180deg, rgba(10, 18, 32, 0.95), rgba(10, 18, 32, 0.7));
      border-bottom: 1px solid rgba(0, 229, 255, 0.3);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; z-index: 1000;
    }
    .governance-content { text-align: center; }
    .governance-title {
      font-size: 14px; font-weight: 700;
      color: #00e5ff; letter-spacing: 2.5px;
      margin-bottom: 3px;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
    }
    .governance-status { font-size: 10px; color: #b0c4de; letter-spacing: 0.8px; }
    .active-rule { color: #39ff14; font-weight: 600; text-shadow: 0 0 6px rgba(57, 255, 20, 0.6); }
    .sign-out-link {
      position: absolute; top: 12px; right: 16px;
      font-size: 10px; color: rgba(255, 255, 255, 0.4);
      text-decoration: none; letter-spacing: 1px;
      text-transform: uppercase; font-weight: 500;
      transition: color 0.2s; cursor: pointer;
      z-index: 1001;
    }
    .sign-out-link:hover { color: rgba(255, 255, 255, 0.8); }

    /* Side panels */
    .provenance-panel { grid-area: provenance; }
    .pulse-panel { grid-area: cognitive; }

    .provenance-panel, .pulse-panel {
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }
    .provenance-panel {
      background: rgba(15, 22, 36, 0.75);
      border-right: 1px solid rgba(0, 229, 255, 0.2);
    }
    .pulse-panel {
      background: rgba(20, 15, 32, 0.75);
      border-left: 1px solid rgba(191, 90, 242, 0.2);
    }
    .panel-header {
      padding: 14px 12px 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      margin-bottom: 3px;
    }
    .panel-subtitle {
      font-size: 9px; color: #708090;
      letter-spacing: 0.6px; text-transform: uppercase;
    }
    .provenance-panel .panel-title { color: #00e5ff; text-shadow: 0 0 6px rgba(0, 229, 255, 0.4); }
    .pulse-panel .panel-title { color: #bf5af2; text-shadow: 0 0 6px rgba(191, 90, 242, 0.4); }

    .panel-body {
      padding: 12px;
      flex: 1; overflow-y: auto;
    }

    .memory-card {
      background: linear-gradient(135deg, rgba(15, 22, 32, 0.9), rgba(25, 32, 42, 0.8));
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 8px;
      padding: 10px 11px;
      margin-bottom: 10px;
      font-size: 11px; line-height: 1.4;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
    }
    .memory-header {
      display: flex; justify-content: space-between;
      margin-bottom: 6px;
      font-size: 10px; color: #00e5ff; font-weight: 600;
    }
    .memory-header .ref { color: #708090; font-weight: 400; font-size: 9px; }
    .memory-content {
      color: #d8e0ec;
      margin-bottom: 6px;
      font-size: 10.5px;
      overflow-wrap: break-word; word-break: break-word;
    }
    .memory-meta { font-size: 9px; color: #708090; line-height: 1.45; }
    .warning {
      background: rgba(255, 152, 0, 0.12);
      border-left: 3px solid #ff9800;
      padding: 5px 7px;
      margin-top: 6px;
      font-size: 9px; color: #ffa726;
      border-radius: 0 4px 4px 0; line-height: 1.3;
    }
    .empty-state {
      color: #708090; font-size: 11px;
      font-style: italic; padding: 14px 8px;
      text-align: center;
    }

    /* Login overlay */
    .login-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; padding: 20px;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      background: rgba(10, 18, 32, 0.98);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 14px; padding: 28px 24px;
      width: 100%; max-width: 360px;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
    }
    .login-wordmark {
      font-size: 11px; font-weight: 700;
      color: #00e5ff; letter-spacing: 2.5px;
      text-transform: uppercase; text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }
    .login-label {
      font-size: 10px; color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1.2px; text-transform: uppercase;
      text-align: center; margin-bottom: 24px;
    }
    .login-input {
      width: 100%; background: rgba(15, 25, 40, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 8px; padding: 12px 14px;
      color: #ffffff; font-size: 14px;
      font-family: inherit; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-input:focus {
      outline: none; border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
    }
    .login-input::placeholder { color: rgba(176, 196, 222, 0.5); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026; border: none; border-radius: 8px;
      padding: 14px; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; margin-bottom: 16px;
      transition: background 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .login-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-forgot {
      text-align: center; font-size: 11px;
      color: rgba(0, 229, 255, 0.7); text-decoration: none;
      letter-spacing: 0.5px; transition: color 0.2s;
    }
    .login-forgot:hover { color: #00e5ff; }
    .login-error {
      background: rgba(255, 73, 87, 0.15);
      border: 1px solid rgba(255, 73, 87, 0.3);
      border-radius: 6px; padding: 8px 12px;
      color: #ff6b80; font-size: 11px;
      margin-top: 12px; line-height: 1.4;
    }
    .login-success {
      background: rgba(57, 255, 20, 0.15);
      border: 1px solid rgba(57, 255, 20, 0.3);
      border-radius: 6px; padding: 8px 12px;
      color: #39ff14; font-size: 11px;
      margin-top: 12px; line-height: 1.4;
    }

    .pulse-item {
      background: rgba(15, 20, 25, 0.6);
      border-left: 2px solid #bf5af2;
      padding: 6px 8px;
      margin-bottom: 5px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #b0c4de;
      border-radius: 0 4px 4px 0;
      line-height: 1.3;
      overflow-wrap: break-word; word-break: break-word;
    }
    .pulse-item.active {
      border-left-color: #39ff14;
      background: rgba(57, 255, 20, 0.06);
      color: #b8ffb0;
    }

    /* Neural orb — Three.js canvas fills the center grid cell */
    .neural-center {
      grid-area: canvas;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.07), transparent 65%);
      overflow: hidden;
      position: relative;
      --voice-level: 0;
      min-width: 0; min-height: 0;
    }
    #orbCanvas {
      position: absolute; inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Conversation console */
    .conversation-panel {
      grid-area: console;
      background: linear-gradient(180deg, transparent, rgba(15, 22, 36, 0.95) 40%);
      border-top: 1px solid rgba(0, 229, 255, 0.25);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 14px 22px 16px 22px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 100;
    }
    .response-bubble {
      background: linear-gradient(135deg, rgba(30, 35, 50, 0.95), rgba(20, 25, 40, 0.9));
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 13px; line-height: 1.45;
      max-width: 820px; width: 100%;
      align-self: center;
      max-height: 110px; overflow-y: auto;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35), 0 0 12px rgba(0, 229, 255, 0.08);
    }
    .response-bubble:empty::before {
      content: 'Ready when you are.';
      color: rgba(176, 196, 222, 0.5);
    }

    .input-bar {
      display: flex; align-items: center;
      background: rgba(15, 20, 30, 0.85);
      border: 1px solid rgba(0, 229, 255, 0.4);
      border-radius: 28px;
      padding: 5px 5px 5px 18px;
      gap: 6px;
      max-width: 820px; width: 100%;
      align-self: center;
    }
    .message-input {
      flex: 1; min-width: 0;
      background: transparent; border: none; outline: none;
      color: #ffffff; font-size: 14px; padding: 9px 0;
      font-family: inherit;
    }
    .message-input::placeholder { color: rgba(176, 196, 222, 0.5); }

    .input-controls { display: flex; gap: 6px; flex-shrink: 0; }
    .control-btn {
      height: 34px;
      min-width: 60px;
      padding: 0 12px;
      border-radius: 18px;
      border: 1px solid rgba(0, 229, 255, 0.45);
      background: linear-gradient(135deg, rgba(35, 40, 55, 0.9), rgba(25, 30, 45, 0.8));
      color: #d8e6f0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s, transform 0.08s;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .control-btn:hover:not(:disabled) {
      border-color: #00e5ff; color: #ffffff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
    }
    /* Press feedback — clearly visible tap */
    .control-btn:active:not(:disabled) {
      transform: scale(0.94);
      background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026;
      box-shadow: 0 0 22px rgba(0, 229, 255, 0.9);
    }
    /* Toggled-on state (mic on, speak on, camera open) */
    .control-btn.active {
      background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026; border-color: #00f5d4;
      box-shadow: 0 0 18px rgba(0, 229, 255, 0.75);
      animation: btnPulseRing 1.4s ease-in-out infinite;
    }
    @keyframes btnPulseRing {
      0%, 100% { box-shadow: 0 0 14px rgba(0, 229, 255, 0.55); }
      50%      { box-shadow: 0 0 24px rgba(0, 229, 255, 0.95); }
    }
    .send-btn {
      background: linear-gradient(135deg, #00e5ff, #bf5af2);
      color: #ffffff; border-color: #00e5ff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
    }
    .send-btn:hover:not(:disabled) { box-shadow: 0 0 22px rgba(0, 229, 255, 0.8); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    /* Quick flash when a button finishes its action */
    .control-btn.flash {
      animation: btnFlash 0.45s ease-out;
    }
    @keyframes btnFlash {
      0%   { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); }
      40%  { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
    }

    /* Camera modal */
    .camera-modal {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center; justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    .camera-modal.open { display: flex; }
    .camera-box {
      background: rgba(10, 18, 32, 0.98);
      border: 1px solid rgba(0, 229, 255, 0.5);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
      max-width: 460px; width: 100%;
    }
    #cameraVideo {
      width: 100%; max-height: 60vh;
      background: #000; border-radius: 8px;
      object-fit: cover;
    }
    .camera-actions {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 12px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .oracle-main { grid-template-columns: 24% 1fr 24%; }
    }
    @media (max-width: 720px) {
      .oracle-main { grid-template-columns: 30% 1fr 30%; grid-template-rows: 54px 1fr auto; }
      .governance-title { font-size: 11px; letter-spacing: 1.2px; }
      .governance-status { font-size: 8.5px; letter-spacing: 0.3px; }
      .panel-header { padding: 10px 8px 7px 8px; }
      .panel-title { font-size: 10.5px; letter-spacing: 1px; }
      .panel-subtitle { font-size: 8px; }
      .panel-body { padding: 8px 7px; }
      .memory-card { padding: 7px 8px; margin-bottom: 7px; border-radius: 6px; font-size: 10px; }
      .memory-header { font-size: 9px; margin-bottom: 4px; }
      .memory-content { font-size: 9.5px; margin-bottom: 4px; }
      .memory-meta { font-size: 8px; }
      .warning { font-size: 8px; padding: 4px 5px; line-height: 1.25; }
      .pulse-item { font-size: 9px; padding: 4px 6px; margin-bottom: 4px; }
      .empty-state { font-size: 9.5px; padding: 10px 4px; }
      .conversation-panel { padding: 10px 8px 12px 8px; gap: 8px; }
      .response-bubble { font-size: 12px; padding: 9px 12px; max-height: 70px; border-radius: 12px; }
      .input-bar { padding: 4px 4px 4px 12px; border-radius: 22px; }
      .message-input { font-size: 12px; padding: 7px 0; }
      .control-btn { height: 30px; min-width: 50px; font-size: 10px; padding: 0 9px; letter-spacing: 0.6px; }
      .input-controls { gap: 4px; }
    }
    @media (max-width: 380px) {
      .oracle-main { grid-template-columns: 28% 1fr 28%; }
      .control-btn { height: 28px; min-width: 44px; font-size: 9.5px; padding: 0 7px; }
    }
  </style>
</head>
<body>
  <div class="oracle-main">
    <header class="claspion-governance">
      <div class="governance-content">
        <div class="governance-title">CLASPION GOVERNANCE</div>
        <div class="governance-status">
          CURRENT BINDING DECISIONS: 1. TRUTH OVER COMFORT [RULE 001] <span class="active-rule">[ACTIVE]</span>
        </div>
      </div>
      <a class="sign-out-link" id="signOutLink" style="display: none;">SIGN OUT</a>
    </header>

    <aside class="provenance-panel">
      <div class="panel-header">
        <div class="panel-title">Provenance Stream</div>
        <div class="panel-subtitle">Memory Verification &amp; Source Tracking</div>
      </div>
      <div class="panel-body" id="memoryList">
        <div class="empty-state">Loading memories…</div>
      </div>
    </aside>

    <main class="neural-center" id="neuralCenter">
      <canvas id="orbCanvas"></canvas>
    </main>

    <aside class="pulse-panel">
      <div class="panel-header">
        <div class="panel-title">Cognitive Pulse</div>
        <div class="panel-subtitle">Live System Events</div>
      </div>
      <div class="panel-body" id="pulseList">
        <div class="empty-state">Loading events…</div>
      </div>
    </aside>

    <section class="conversation-panel">
      <div class="response-bubble" id="responseBubble"></div>
      <div class="input-bar">
        <input type="text" class="message-input" id="messageInput" placeholder="Ask Splendor anything…" autocomplete="off">
        <div class="input-controls">
          <button class="control-btn send-btn" id="sendButton" type="button" disabled>SEND</button>
          <button class="control-btn" id="micButton" type="button" aria-pressed="false">MIC</button>
          <button class="control-btn" id="voiceButton" type="button" aria-pressed="false">SPEAK</button>
          <button class="control-btn" id="cameraButton" type="button">CAMERA</button>
        </div>
      </div>
    </section>
  </div>

  <div class="camera-modal" id="cameraModal" aria-hidden="true">
    <div class="camera-box">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <div class="camera-actions">
        <button class="control-btn send-btn" id="captureButton" type="button">CAPTURE</button>
        <button class="control-btn" id="closeCameraButton" type="button">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Login overlay -->
  <div class="login-overlay hidden" id="loginOverlay">
    <div class="login-card">
      <div class="login-wordmark">SPLENDOR · THE REMARKABLE AI</div>
      <div class="login-label">SIGN IN</div>
      <form id="loginForm">
        <input type="email" class="login-input" id="emailInput" placeholder="Email address" required autocomplete="email">
        <input type="password" class="login-input" id="passwordInput" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="login-btn" id="loginButton">SIGN IN</button>
      </form>
      <a href="#" class="login-forgot" id="forgotLink">Forgot password?</a>
      <div id="loginMessage"></div>
    </div>
  </div>

  <!-- Supabase Client Initialization -->
  <script>
    // Initialize Supabase client with server-injected config
    const { createClient } = supabase;
    const splendorSupabase = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__', {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  </script>

  <script>
    // Authentication and fetch wrapper
    let currentUser = null;

    // splendorFetch wrapper - handles JWT auth and refresh
    async function splendorFetch(url, options = {}) {
      // Get current session
      const { data: { session }, error } = await splendorSupabase.auth.getSession();

      if (!session) {
        showLoginOverlay();
        throw new Error('Authentication required');
      }

      // Prepare headers
      const headers = new Headers(options.headers || {});
      headers.set('Authorization', `Bearer ${session.access_token}`);

      // Don't override Content-Type for FormData
      if (!(options.body instanceof FormData) && !headers.has('Content-Type')) {
        headers.set('Content-Type', 'application/json');
      }

      const fetchOptions = {
        ...options,
        headers,
        credentials: 'same-origin'
      };

      let response = await fetch(url, fetchOptions);

      // Handle 401 - try refresh once
      if (response.status === 401) {
        const { data: { session: newSession }, error: refreshError } =
          await splendorSupabase.auth.refreshSession();

        if (newSession) {
          headers.set('Authorization', `Bearer ${newSession.access_token}`);
          response = await fetch(url, { ...fetchOptions, headers });
        }

        // Still 401 after refresh - sign out and reload
        if (response.status === 401) {
          await splendorSupabase.auth.signOut();
          window.location.reload();
          return;
        }
      }

      return response;
    }

    // Authentication state management
    function showLoginOverlay() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('signOutLink').style.display = 'none';
    }

    function hideLoginOverlay() {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('signOutLink').style.display = 'block';
    }

    function showLoginMessage(message, isError = false) {
      const messageEl = document.getElementById('loginMessage');
      messageEl.innerHTML = `<div class="${isError ? 'login-error' : 'login-success'}">${message}</div>`;
    }

    function clearLoginMessage() {
      document.getElementById('loginMessage').innerHTML = '';
    }

    // Check auth state on load by testing backend access
    async function checkAuthState() {
      const { data: { session } } = await splendorSupabase.auth.getSession();

      if (session) {
        try {
          // Test owner access by calling a protected endpoint
          const response = await splendorFetch('/api/oracle/memories/recent?limit=1');

          if (response.status === 200) {
            // User is authenticated and authorized (owner)
            currentUser = session.user;
            hideLoginOverlay();
            return true;
          } else if (response.status === 403) {
            // User is authenticated but not authorized (not owner)
            await splendorSupabase.auth.signOut();
            showLoginOverlay();
            showLoginMessage('Access denied. This system is restricted to the owner only.', true);
            return false;
          } else {
            // Other error - try again
            showLoginOverlay();
            return false;
          }
        } catch (error) {
          // Network or other error - show login

    function getAudioContext() {

      const start = 2;
      const end = Math.min(freqData.length, 48);
      for (let i = start; i < end; i++) sum += freqData[i];
      const avg = sum / (end - start);          // 0..255

      return bytes.buffer;

    async function speakWithOpenAI(text) {
      const res = await splendorFetch('/api/voice/speak', {
        method: 'POST',
        body: JSON.stringify({ text })

      if (!res.ok) throw new Error('speak ' + res.status);
      const data = await res.json();
      if (!data.audio) {
        // No OpenAI audio available — fall back to browser TTS so the
        // user still hears something, but skip the audio-reactive path.
        return { audio: null, fallback: true };

      return { audio: data.audio, fallback: false };

    async function playAudioReactive(b64) {

      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);

      setState('speaking');
      source.start(0);
      tickOrbFromAudio();

      canvas.height = cameraVideo.videoHeight;

    captureButton.addEventListener('click', captureFrame);

    fetchEvents();

      r2.rotation.y = t * 0.5 * mul; r2.rotation.z = -t * 0.3 * mul;
      r3.rotation.x = -t * 0.3 * mul; r3.rotation.y = t * 0.4 * mul;
      r4.rotation.z = t * 0.6 * mul; r4.rotation.x = t * 0.2 * mul;
      r5.rotation.y = t * 0.25 * mul;
      r6.rotation.z = t * 0.18 * mul;

      shell1.scale.setScalar(1 + Math.sin(t * 1.5) * 0.05 + v * 0.18);
      shell1.rotation.y = t * 0.1;
      shell2.scale.setScalar(1 + Math.sin(t * 2.2 + Math.PI / 3) * 0.08 + v * 0.22);
      shell2.rotation.x = t * 0.15;
      shell3.scale.setScalar(1 + Math.sin(t * 0.8 + (Math.PI * 2) / 3) * 0.06 + v * 0.16);
      shell3.rotation.z = t * 0.08;

      const corePulse = 1 + Math.sin(t * 2) * 0.1 + v * 0.5;
      body.scale.setScalar(corePulse);
      body.rotation.y = t * 0.1 * mul;
      inner.scale.set(1.3 * corePulse, 0.7 * corePulse, 1.1 * corePulse);
      inner.rotation.y = -t * 0.15;
      core.scale.setScalar(1 + v * 0.45);
      coreMat.emissiveIntensity = 2.5 + v * 3;

      for (const p of particles) {
        const ot = t * p.speed;
        p.mesh.position.set(
          Math.cos(p.angle + ot) * p.radius,
          Math.sin(ot * 2) * p.height,
          Math.sin(p.angle + ot) * p.radius
        );
      }

      // Recolor lights + core to match the live state
      const c = COLORS[state] || COLORS.idle;
      l1.color.setHex(c.primary);
      l2.color.setHex(c.secondary);
      coreMat.emissive.setHex(c.primary);
      bodyMat.emissive.setHex(c.secondary);

      root.position.y = Math.sin(t * 0.6) * 0.1;
      root.rotation.y = t * 0.05;

      composer.render();
      requestAnimationFrame(frame);
    }
    frame();
  </script>
</body>
</html>
