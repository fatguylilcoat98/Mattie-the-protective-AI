    const bloomPass = new UnrealBloomPass(
      new THREE.Vector2(1, 1), // resized in resize()
      0.85,  // strength
      0.85,  // radius
      0.18   // threshold (anything brighter than this blooms)
    );
    const outputPass = new OutputPass();
    composer.addPass(renderPass);
    composer.addPass(bloomPass);
    composer.addPass(outputPass);

    // Lights
    const ambient = new THREE.AmbientLight(0x0a1a2a, 0.25);
    const l1 = new THREE.PointLight(0x00e5ff, 4, 50);
    const l2 = new THREE.PointLight(0x4ff0b7, 2.5, 50); l2.position.set(5, 5, 5);
    const l3 = new THREE.PointLight(0xbf5af2, 1.8, 50); l3.position.set(-5, -5, -5);
    const l4 = new THREE.PointLight(0x00f5d4, 1.2, 50); l4.position.set(0, 8, 0);
    scene.add(ambient, l1, l2, l3, l4);

    const root = new THREE.Group();
    scene.add(root);

    // Core consciousness sphere (bright white emissive)
    const coreMat = new THREE.MeshStandardMaterial({
      color: 0xffffff,
      emissive: 0x00e5ff,
      emissiveIntensity: 2.5,
      transparent: true,
      opacity: 0.95
    });
    const core = new THREE.Mesh(new THREE.SphereGeometry(0.5, 24, 24), coreMat);
    root.add(core);

    // Neural pathway sphere (slightly larger, transparent, stretched)
    const innerMat = new THREE.MeshStandardMaterial({
      color: 0x00e5ff,
      emissive: 0x4ff0b7,
      emissiveIntensity: 1.0,
      transparent: true,
      opacity: 0.45,
      metalness: 0.3,
      roughness: 0.2
    });
    const inner = new THREE.Mesh(new THREE.SphereGeometry(0.8, 16, 16), innerMat);
    inner.scale.set(1.3, 0.7, 1.1);
    root.add(inner);

    // Outer neural-network body
    const bodyMat = new THREE.MeshStandardMaterial({
      color: 0x00e5ff,
      emissive: 0x4ff0b7,
      emissiveIntensity: 1.2,
      transparent: true,
      opacity: 0.55,
      metalness: 0.1,
      roughness: 0.4
    });
    const body = new THREE.Mesh(new THREE.IcosahedronGeometry(1.0, 3), bodyMat);
    root.add(body);

    // Wireframe energy shells
    function shell(r, color, opacity, segments = 24) {
      return new THREE.Mesh(
        new THREE.SphereGeometry(r, segments, segments),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity, wireframe: true })
      );
    }
    const shell1 = shell(1.4, 0x00e5ff, 0.18, 20);
    const shell2 = shell(1.8, 0x4ff0b7, 0.10, 24);
    const shell3 = shell(2.2, 0x00e5ff, 0.05, 32);
    root.add(shell1, shell2, shell3);

    // Orbital rings — multiple torus rings at different orientations
    function ring(radius, tube, color, opacity, eulerXYZ, scaleXYZ = [1, 1, 1]) {
      const m = new THREE.Mesh(
        new THREE.TorusGeometry(radius, tube, 16, 100),
        new THREE.MeshBasicMaterial({ color, transparent: true, opacity })
      );
      m.rotation.set(...eulerXYZ);
      m.scale.set(...scaleXYZ);
      return m;
    }
    const r1 = ring(2.8, 0.025, 0x00e5ff, 0.9,  [Math.PI / 2, 0, 0]);
    const r2 = ring(3.2, 0.030, 0xbf5af2, 0.7,  [Math.PI / 4, Math.PI / 3, 0], [1, 0.8, 1]);
    const r3 = ring(3.6, 0.025, 0x4ff0b7, 0.6,  [0, Math.PI / 6, Math.PI / 4], [1.2, 0.6, 1.2]);
    const r4 = ring(4.0, 0.020, 0x00f5d4, 0.5,  [Math.PI / 3, -Math.PI / 4, Math.PI / 6], [0.9, 1.1, 0.9]);
    const r5 = ring(1.8, 0.012, 0xff6b9d, 0.35, [Math.PI / 6, Math.PI / 2, 0]);
    const r6 = ring(2.2, 0.010, 0xffd700, 0.25, [-Math.PI / 4, 0, Math.PI / 3]);
    root.add(r1, r2, r3, r4, r5, r6);

    // Neural connection nodes (12 small bright spheres)
    const nodeGroup = new THREE.Group();
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const radius = 0.6 + Math.sin(i) * 0.2;
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 8, 8),
        new THREE.MeshStandardMaterial({
          color: 0x4ff0b7, emissive: 0x4ff0b7, emissiveIntensity: 3
        })
      );
      m.position.set(Math.cos(angle) * radius, Math.sin(angle * 1.3) * radius * 0.5, Math.sin(angle) * radius);
      nodeGroup.add(m);
    }
    root.add(nodeGroup);

    // Particle stream orbiting the core
    const particleCount = 60;
    const particleGroup = new THREE.Group();
    const particles = [];
    for (let i = 0; i < particleCount; i++) {
      const m = new THREE.Mesh(
        new THREE.SphereGeometry(0.025, 6, 6),
        new THREE.MeshBasicMaterial({ color: 0x4ff0b7 })
      );
      particles.push({
        mesh: m,
        angle: (i / particleCount) * Math.PI * 2,
        radius: 2 + Math.sin(i * 0.5) * 0.5,
        height: Math.sin(i * 0.3) * 0.8,
        speed: 0.5 + Math.random() * 0.5
      });
      particleGroup.add(m);
    }
    root.add(particleGroup);

    function resize() {
      const w = Math.max(1, canvas.clientWidth);
      const h = Math.max(1, canvas.clientHeight);
      const dpr = renderer.getPixelRatio();
      if (canvas.width !== Math.round(w * dpr) || canvas.height !== Math.round(h * dpr)) {
        renderer.setSize(w, h, false);
        composer.setSize(w, h);
        bloomPass.setSize(w, h);
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
      }
      // Shrink the orb on small screens by pulling the camera back instead
      // of a CSS scale on the canvas. Same visual size as the old
      // scale(0.72) / scale(0.65), but the canvas paints edge-to-edge so
      // there is no transparent ring around the orb.
      const isXs = window.matchMedia('(max-width: 380px)').matches;
      const isSm = window.matchMedia('(max-width: 720px)').matches;
      const targetZ = isXs ? 12.3 : isSm ? 11.1 : 8;
      if (camera.position.z !== targetZ) {
        camera.position.z = targetZ;
        camera.updateProjectionMatrix();
      }
    }
    // Redraw on rotation / mobile keyboard open / window resize
    window.addEventListener('resize', resize);
    window.addEventListener('orientationchange', resize);

    const COLORS = {
      idle:      { primary: 0x00e5ff, secondary: 0x4ff0b7 },
      listening: { primary: 0x39ff14, secondary: 0x00f5d4 },
      thinking:  { primary: 0xbf5af2, secondary: 0xff6b9d },
      speaking:  { primary: 0x00e5ff, secondary: 0x00f5d4 }
    };

    function currentStateName() {
      const cl = document.body.classList;
      if (cl.contains('state-listening')) return 'listening';
      if (cl.contains('state-thinking'))  return 'thinking';
      if (cl.contains('state-speaking'))  return 'speaking';
      return 'idle';
    }

    const t0 = performance.now();
    function frame() {
      resize();
      const t = (performance.now() - t0) / 1000;
      const v = Math.max(0, Math.min(1, window.__orbVoiceLevel || 0));
      const state = currentStateName();
      const mul = state === 'listening' ? 2 :
                  state === 'thinking'  ? 1.5 :
                  state === 'speaking'  ? (1 + v * 1.5) : 1;

      // Per-ring boosts driven by real backend signals (SSE). Each band's
      // boost decays toward 0 over ~800ms. ai:call:start raises 'inner'
      // and holds it until ai:call:end. memory:* blips 'middle'. claspion
      // blips 'outer'. window.__orbRingBoost is written by the SSE handler
      // below; we never invent activity here.
      const rb = window.__orbRingBoost || (window.__orbRingBoost = { outer: 0, middle: 0, inner: 0 });
      const aiOpen = window.__orbAiCallActive ? 1 : 0;
      const outerBoost  = 1 + rb.outer  * 2.2;
      const middleBoost = 1 + rb.middle * 1.8;
      const innerBoost  = 1 + Math.max(rb.inner, aiOpen) * 2.0;
      r1.rotation.x = t * 0.4 * mul * middleBoost; r1.rotation.z = t * 0.2 * mul * middleBoost;
      r2.rotation.y = t * 0.5 * mul * middleBoost; r2.rotation.z = -t * 0.3 * mul * middleBoost;
      r3.rotation.x = -t * 0.3 * mul * outerBoost; r3.rotation.y = t * 0.4 * mul * outerBoost;
      r4.rotation.z = t * 0.6 * mul * outerBoost;  r4.rotation.x = t * 0.2 * mul * outerBoost;
      r5.rotation.y = t * 0.25 * mul * innerBoost;
      r6.rotation.z = t * 0.18 * mul * innerBoost;
      // Decay transient boosts toward 0 (~800ms half-life at 60fps).
      rb.outer  *= 0.965;
      rb.middle *= 0.965;
      rb.inner  *= 0.965;

      shell1.scale.setScalar(1 + Math.sin(t * 1.5) * 0.05 + v * 0.18);
      shell1.rotation.y = t * 0.1;
      shell2.scale.setScalar(1 + Math.sin(t * 2.2 + Math.PI / 3) * 0.08 + v * 0.22);
      shell2.rotation.x = t * 0.15;
      shell3.scale.setScalar(1 + Math.sin(t * 0.8 + (Math.PI * 2) / 3) * 0.06 + v * 0.16);
      shell3.rotation.z = t * 0.08;

      const corePulse = 1 + Math.sin(t * 2) * 0.1 + v * 0.5;
      body.scale.setScalar(corePulse);
      body.rotation.y = t * 0.1 * mul;
      inner.scale.set(1.3 * corePulse, 0.7 * corePulse, 1.1 * corePulse);
      inner.rotation.y = -t * 0.15;
      core.scale.setScalar(1 + v * 0.45);
      coreMat.emissiveIntensity = 2.5 + v * 3;

      for (const p of particles) {
        const ot = t * p.speed;
        p.mesh.position.set(
          Math.cos(p.angle + ot) * p.radius,
          Math.sin(ot * 2) * p.height,
          Math.sin(p.angle + ot) * p.radius
        );
      }

      // Recolor lights + core to match the live state
      const c = COLORS[state] || COLORS.idle;
      l1.color.setHex(c.primary);
      l2.color.setHex(c.secondary);
      coreMat.emissive.setHex(c.primary);
      bodyMat.emissive.setHex(c.secondary);

      root.position.y = Math.sin(t * 0.6) * 0.1;
      root.rotation.y = t * 0.05;

      composer.render();
      requestAnimationFrame(frame);
    }
    frame();
  </script>
