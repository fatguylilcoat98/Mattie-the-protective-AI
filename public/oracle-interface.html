<!--
  Splendor Oracle Interface
  3-column responsive grid: PROVENANCE STREAM · Neural Orb · COGNITIVE PULSE
  All panels wired to live backend endpoints:
    /api/oracle/memories/recent  → provenance stream
    /api/oracle/events/recent    → cognitive pulse
    /api/enhanced/chat           → conversation
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Splendor Oracle Interface</title>
  <!-- Supabase SDK - self-hosted for CSP compliance -->
  <script src="/lib/supabase.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Resolve bare "three" imports used by the post-processing addons. -->
  <script type="importmap">
    {
      "imports": {
        "three": "/lib/three.module.min.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(ellipse at center, #0a1428 0%, #040810 60%, #02040a 100%);
      color: #ffffff;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0, 229, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 229, 255, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    .oracle-main {
      display: grid;
      grid-template-columns: 22% 1fr 22%;
      grid-template-rows: 64px 1fr auto;
      grid-template-areas:
        "header header header"
        "provenance canvas cognitive"
        "console console console";
      height: 100vh; height: 100dvh;
      width: 100vw;
      position: relative; z-index: 1;
    }

    /* Header */
    .claspion-governance {
      grid-area: header;
      background: linear-gradient(180deg, rgba(10, 18, 32, 0.95), rgba(10, 18, 32, 0.7));
      border-bottom: 1px solid rgba(0, 229, 255, 0.3);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      padding: 0 12px; z-index: 1000;
    }
    .governance-content { text-align: center; }
    .governance-title {
      font-size: 14px; font-weight: 700;
      color: #00e5ff; letter-spacing: 2.5px;
      margin-bottom: 3px;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.6);
    }
    .governance-status { font-size: 10px; color: #b0c4de; letter-spacing: 0.8px; transition: color 180ms ease, text-shadow 180ms ease; }
    .governance-status.live {
      color: #00e5ff;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.7);
      animation: claspion-flash 240ms ease-out;
    }
    .governance-status .ticker-stage {
      display: inline-block;
      padding: 0 2px;
      animation: claspion-stage-in 240ms ease-out;
    }
    @keyframes claspion-flash {
      0%   { opacity: 0.55; }
      40%  { opacity: 1; }
      100% { opacity: 1; }
    }
    @keyframes claspion-stage-in {
      from { opacity: 0; transform: translateY(-2px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .active-rule { color: #39ff14; font-weight: 600; text-shadow: 0 0 6px rgba(57, 255, 20, 0.6); }
    .version-display {
      font-size: 9px; color: rgba(0, 229, 255, 0.6);
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-top: 2px; text-align: center;
    }
    .sign-out-link {
      position: absolute; top: 12px; right: 16px;
      font-size: 10px; color: rgba(255, 255, 255, 0.4);
      text-decoration: none; letter-spacing: 1px;
      text-transform: uppercase; font-weight: 500;
      transition: color 0.2s; cursor: pointer;
      z-index: 1001;
    }
    .sign-out-link:hover { color: rgba(255, 255, 255, 0.8); }

    /* Side panels */
    .provenance-panel { grid-area: provenance; }
    .pulse-panel { grid-area: cognitive; }

    .provenance-panel, .pulse-panel {
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      overflow: hidden;
      display: flex; flex-direction: column;
      position: relative;
    }
    .provenance-panel {
      background: rgba(15, 22, 36, 0.75);
      border-right: 1px solid rgba(0, 229, 255, 0.2);
    }
    .pulse-panel {
      background: rgba(20, 15, 32, 0.75);
      border-left: 1px solid rgba(191, 90, 242, 0.2);
    }
    .panel-header {
      padding: 14px 12px 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      flex-shrink: 0;
    }
    .panel-title {
      font-size: 12px; font-weight: 700;
      letter-spacing: 1.4px; text-transform: uppercase;
      margin-bottom: 3px;
    }
    .panel-subtitle {
      font-size: 9px; color: #708090;
      letter-spacing: 0.6px; text-transform: uppercase;
    }
    .provenance-panel .panel-title { color: #00e5ff; text-shadow: 0 0 6px rgba(0, 229, 255, 0.4); }
    .pulse-panel .panel-title { color: #bf5af2; text-shadow: 0 0 6px rgba(191, 90, 242, 0.4); }

    .panel-body {
      padding: 12px;
      flex: 1; overflow-y: auto;
    }

    .memory-card {
      background: linear-gradient(135deg, rgba(15, 22, 32, 0.9), rgba(25, 32, 42, 0.8));
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 8px;
      padding: 10px 11px;
      margin-bottom: 10px;
      font-size: 11px; line-height: 1.4;
      box-shadow: 0 3px 10px rgba(0, 0, 0, 0.35);
    }
    .memory-header {
      display: flex; justify-content: space-between;
      margin-bottom: 6px;
      font-size: 10px; color: #00e5ff; font-weight: 600;
    }
    .memory-header .ref { color: #708090; font-weight: 400; font-size: 9px; }
    .memory-content {
      color: #d8e0ec;
      margin-bottom: 6px;
      font-size: 10.5px;
      overflow-wrap: break-word; word-break: break-word;
    }
    .memory-meta { font-size: 9px; color: #708090; line-height: 1.45; }
    .warning {
      background: rgba(255, 152, 0, 0.12);
      border-left: 3px solid #ff9800;
      padding: 5px 7px;
      margin-top: 6px;
      font-size: 9px; color: #ffa726;
      border-radius: 0 4px 4px 0; line-height: 1.3;
    }
    .empty-state {
      color: #708090; font-size: 11px;
      font-style: italic; padding: 14px 8px;
      text-align: center;
    }

    /* Login overlay */
    .login-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      display: flex; align-items: center; justify-content: center;
      z-index: 3000; padding: 20px;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      background: rgba(10, 18, 32, 0.98);
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 14px; padding: 28px 24px;
      width: 100%; max-width: 360px;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.2);
    }
    .login-wordmark {
      font-size: 11px; font-weight: 700;
      color: #00e5ff; letter-spacing: 2.5px;
      text-transform: uppercase; text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 0 8px rgba(0, 229, 255, 0.5);
    }
    .login-label {
      font-size: 10px; color: rgba(255, 255, 255, 0.6);
      letter-spacing: 1.2px; text-transform: uppercase;
      text-align: center; margin-bottom: 24px;
    }
    .login-input {
      width: 100%; background: rgba(15, 25, 40, 0.9);
      border: 1px solid rgba(0, 229, 255, 0.25);
      border-radius: 8px; padding: 12px 14px;
      color: #ffffff; font-size: 14px;
      font-family: inherit; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-input:focus {
      outline: none; border-color: #00e5ff;
      box-shadow: 0 0 12px rgba(0, 229, 255, 0.3);
    }
    .login-input::placeholder { color: rgba(176, 196, 222, 0.5); }
    .login-btn {
      width: 100%; background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026; border: none; border-radius: 8px;
      padding: 14px; font-size: 11px; font-weight: 700;
      letter-spacing: 1.5px; text-transform: uppercase;
      cursor: pointer; margin-bottom: 16px;
      transition: background 0.2s, box-shadow 0.2s;
      font-family: inherit;
    }
    .login-btn:hover:not(:disabled) {
      box-shadow: 0 0 20px rgba(0, 229, 255, 0.6);
    }
    .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .login-forgot {
      text-align: center; font-size: 11px;
      color: rgba(0, 229, 255, 0.7); text-decoration: none;
      letter-spacing: 0.5px; transition: color 0.2s;
    }
    .login-forgot:hover { color: #00e5ff; }
    .login-error {
      background: rgba(255, 73, 87, 0.15);
      border: 1px solid rgba(255, 73, 87, 0.3);
      border-radius: 6px; padding: 8px 12px;
      color: #ff6b80; font-size: 11px;
      margin-top: 12px; line-height: 1.4;
    }
    .login-success {
      background: rgba(57, 255, 20, 0.15);
      border: 1px solid rgba(57, 255, 20, 0.3);
      border-radius: 6px; padding: 8px 12px;
      color: #39ff14; font-size: 11px;
      margin-top: 12px; line-height: 1.4;
    }

    .pulse-item {
      background: rgba(15, 20, 25, 0.6);
      border-left: 2px solid #bf5af2;
      padding: 6px 8px;
      margin-bottom: 5px;
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      color: #b0c4de;
      border-radius: 0 4px 4px 0;
      line-height: 1.3;
      overflow-wrap: break-word; word-break: break-word;
    }
    .pulse-item.active {
      border-left-color: #39ff14;
      background: rgba(57, 255, 20, 0.06);
      color: #b8ffb0;
    }

    /* Neural orb — Three.js canvas fills the center grid cell */
    .neural-center {
      grid-area: canvas;
      background: radial-gradient(circle, rgba(0, 229, 255, 0.07), transparent 65%);
      overflow: hidden;
      position: relative;
      --voice-level: 0;
      min-width: 0; min-height: 0;
    }
    /* Art canvas — full-viewport overlay. Image starts as a tiny circle
       at the orb's center, expands to a glowing disc (~35vmin), then
       uncircles and fills the screen. JS drives the timing. */
    #artCanvas {
      position: fixed;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    #artCanvas.visible {
      pointer-events: all;
    }
    #artCanvas img {
      position: absolute;
      border-radius: 50%;
      width: 0px;
      height: 0px;
      object-fit: cover;
      transform: translate(-50%, -50%);
      top: 50%;
      left: 50%;
      box-shadow:
        0 0 60px rgba(0, 255, 200, 0.4),
        0 0 120px rgba(0, 200, 255, 0.2);
      transition: none; /* JS drives the size transition for phase 1 */
    }
    #artDismiss {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 51;
      background: rgba(0,0,0,0.6);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(0,255,200,0.3);
      border-radius: 24px;
      padding: 10px 28px;
      font-size: 14px;
      letter-spacing: 0.08em;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      font-family: inherit;
    }
    #artDismiss.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #artDismiss:hover {
      background: rgba(0,255,200,0.15);
      border-color: rgba(0,255,200,0.6);
    }
    #orbCanvas {
      position: absolute; inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Conversation console */
    .conversation-panel {
      grid-area: console;
      background: linear-gradient(180deg, transparent, rgba(15, 22, 36, 0.95) 40%);
      border-top: 1px solid rgba(0, 229, 255, 0.25);
      backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
      padding: 14px 22px 16px 22px;
      display: flex; flex-direction: column; gap: 10px;
      z-index: 100;
    }
    .response-bubble {
      background: linear-gradient(135deg, rgba(30, 35, 50, 0.95), rgba(20, 25, 40, 0.9));
      border: 1px solid rgba(0, 229, 255, 0.3);
      border-radius: 14px;
      padding: 12px 16px;
      color: #ffffff;
      font-size: 13px; line-height: 1.45;
      max-width: 820px; width: 100%;
      align-self: center;
      max-height: 110px; overflow-y: auto;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35), 0 0 12px rgba(0, 229, 255, 0.08);
    }
    .response-bubble:empty::before {
      content: 'Ready when you are.';
      color: rgba(176, 196, 222, 0.5);
    }

    /* CONVERSE — hands-free voice session transcript strip */
    .converse-strip {
      display: flex; flex-direction: column; gap: 6px;
      max-width: 820px; width: 100%;
      align-self: center;
      margin-bottom: 8px;
    }
    .converse-line {
      font-size: 12px; line-height: 1.35;
      padding: 8px 12px; border-radius: 10px;
      max-width: 100%;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: opacity 200ms ease;
    }
    .converse-line:empty { opacity: 0.35; }
    .converse-line.user {
      background: rgba(0, 229, 255, 0.08);
      border: 1px solid rgba(0, 229, 255, 0.25);
      color: #b8eaff;
      align-self: flex-end;
    }
    .converse-line.splendor {
      background: rgba(191, 90, 242, 0.08);
      border: 1px solid rgba(191, 90, 242, 0.25);
      color: #e0c8ff;
      align-self: flex-start;
    }
    .control-btn.converse-blocked {
      animation: converse-pulse-deny 600ms ease-out;
    }
    @keyframes converse-pulse-deny {
      0%   { box-shadow: 0 0 0 0 rgba(255, 92, 92, 0.6); }
      80%  { box-shadow: 0 0 0 14px rgba(255, 92, 92, 0); }
      100% { box-shadow: 0 0 0 0 rgba(255, 92, 92, 0); }
    }

    .input-bar {
      display: flex; align-items: center;
      background: rgba(15, 20, 30, 0.85);
      border: 1px solid rgba(0, 229, 255, 0.4);
      border-radius: 28px;
      padding: 5px 5px 5px 18px;
      gap: 6px;
      max-width: 820px; width: 100%;
      align-self: center;
    }
    .message-input {
      flex: 1; min-width: 0;
      background: transparent; border: none; outline: none;
      color: #ffffff; font-size: 14px; padding: 9px 0;
      font-family: inherit;
    }
    .message-input::placeholder { color: rgba(176, 196, 222, 0.5); }

    .input-controls { display: flex; gap: 6px; flex-shrink: 0; }
    .control-btn {
      height: 34px;
      min-width: 60px;
      padding: 0 12px;
      border-radius: 18px;
      border: 1px solid rgba(0, 229, 255, 0.45);
      background: linear-gradient(135deg, rgba(35, 40, 55, 0.9), rgba(25, 30, 45, 0.8));
      color: #d8e6f0;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, box-shadow 0.15s, transform 0.08s;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit;
      font-size: 11px; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .control-btn:hover:not(:disabled) {
      border-color: #00e5ff; color: #ffffff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
    }
    /* Press feedback — clearly visible tap */
    .control-btn:active:not(:disabled) {
      transform: scale(0.94);
      background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026;
      box-shadow: 0 0 22px rgba(0, 229, 255, 0.9);
    }
    /* Toggled-on state (mic on, speak on, camera open) */
    .control-btn.active {
      background: linear-gradient(135deg, #00e5ff, #00f5d4);
      color: #042026; border-color: #00f5d4;
      box-shadow: 0 0 18px rgba(0, 229, 255, 0.75);
      animation: btnPulseRing 1.4s ease-in-out infinite;
    }
    @keyframes btnPulseRing {
      0%, 100% { box-shadow: 0 0 14px rgba(0, 229, 255, 0.55); }
      50%      { box-shadow: 0 0 24px rgba(0, 229, 255, 0.95); }
    }
    .send-btn {
      background: linear-gradient(135deg, #00e5ff, #bf5af2);
      color: #ffffff; border-color: #00e5ff;
      box-shadow: 0 0 14px rgba(0, 229, 255, 0.5);
    }
    .send-btn:hover:not(:disabled) { box-shadow: 0 0 22px rgba(0, 229, 255, 0.8); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
    /* Quick flash when a button finishes its action */
    .control-btn.flash {
      animation: btnFlash 0.45s ease-out;
    }
    @keyframes btnFlash {
      0%   { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0.8); }
      40%  { box-shadow: 0 0 0 10px rgba(0, 229, 255, 0); }
      100% { box-shadow: 0 0 0 0 rgba(0, 229, 255, 0); }
    }

    /* Camera modal */
    .camera-modal {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center; justify-content: center;
      z-index: 2000;
      padding: 20px;
    }
    .camera-modal.open { display: flex; }
    .camera-box {
      background: rgba(10, 18, 32, 0.98);
      border: 1px solid rgba(0, 229, 255, 0.5);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 0 40px rgba(0, 229, 255, 0.4);
      max-width: 460px; width: 100%;
    }
    #cameraVideo {
      width: 100%; max-height: 60vh;
      background: #000; border-radius: 8px;
      object-fit: cover;
    }
    .camera-actions {
      display: flex; gap: 8px; justify-content: center;
      margin-top: 12px;
    }

    /* Responsive */
    @media (max-width: 1024px) {
      .oracle-main { grid-template-columns: 24% 1fr 24%; }
    }
    @media (max-width: 720px) {
      .oracle-main { grid-template-columns: 22% 1fr 22%; grid-template-rows: 54px 1fr auto; }
      .governance-title { font-size: 11px; letter-spacing: 1.2px; }
      .governance-status { font-size: 8.5px; letter-spacing: 0.3px; }
      .panel-header { padding: 10px 8px 7px 8px; }
      .panel-title { font-size: 10.5px; letter-spacing: 1px; }
      .panel-subtitle { font-size: 8px; }
      .panel-body { padding: 8px 7px; }
      .memory-card { padding: 7px 8px; margin-bottom: 7px; border-radius: 6px; font-size: 10px; }
      .memory-header { font-size: 9px; margin-bottom: 4px; }
      .memory-content { font-size: 9.5px; margin-bottom: 4px; }
      .memory-meta { font-size: 8px; }
      .warning { font-size: 8px; padding: 4px 5px; line-height: 1.25; }
      .pulse-item { font-size: 9px; padding: 4px 6px; margin-bottom: 4px; }
      .empty-state { font-size: 9.5px; padding: 10px 4px; }
      .conversation-panel { padding: 10px 8px 12px 8px; gap: 8px; }
      .response-bubble { font-size: 12px; padding: 9px 12px; max-height: 70px; border-radius: 12px; }
      .input-bar { padding: 4px 4px 4px 12px; border-radius: 22px; }
      .message-input { font-size: 12px; padding: 7px 0; }
      .control-btn { height: 30px; min-width: 50px; font-size: 10px; padding: 0 9px; letter-spacing: 0.6px; }
      .input-controls { gap: 4px; }
    }
    @media (max-width: 380px) {
      .oracle-main { grid-template-columns: 20% 1fr 20%; }
      .control-btn { height: 28px; min-width: 44px; font-size: 9.5px; padding: 0 7px; }
    }
  </style>
</head>
<body>
  <div class="oracle-main">
    <header class="claspion-governance">
      <div class="governance-content">
        <div class="governance-title">CLASPION GOVERNANCE</div>
        <div class="version-display" id="versionDisplay">Loading version...</div>
        <div class="governance-status">
          CURRENT BINDING DECISIONS: 1. TRUTH OVER COMFORT [RULE 001] <span class="active-rule">[ACTIVE]</span>
        </div>
      </div>
      <a class="sign-out-link" id="signOutLink" style="display: none;">SIGN OUT</a>
    </header>

    <aside class="provenance-panel">
      <div class="panel-header">
        <div class="panel-title">Provenance Stream</div>
        <div class="panel-subtitle">Memory Verification &amp; Source Tracking</div>
      </div>
      <div class="panel-body" id="memoryList">
        <div class="empty-state">Loading memories…</div>
      </div>
    </aside>

    <main class="neural-center" id="neuralCenter">
      <canvas id="orbCanvas"></canvas>
    </main>

    <!-- Art canvas: full-viewport overlay that holds Splendor's creation. -->
    <div id="artCanvas">
      <img id="artImage" src="" alt="Splendor's creation" />
    </div>
    <button id="artDismiss" type="button">Tap to return</button>

    <aside class="pulse-panel">
      <div class="panel-header">
        <div class="panel-title">Cognitive Pulse</div>
        <div class="panel-subtitle">Live System Events</div>
      </div>
      <div class="panel-body" id="pulseList">
        <div class="empty-state">Loading events…</div>
      </div>
    </aside>

    <section class="conversation-panel">
      <div class="converse-strip" id="converseStrip" hidden>
        <div class="converse-line user"     id="converseUserLine"></div>
        <div class="converse-line splendor" id="converseSplendorLine"></div>
      </div>
      <audio id="converseAudio" autoplay playsinline hidden></audio>
      <div class="response-bubble" id="responseBubble"></div>
      <div class="input-bar">
        <input type="text" class="message-input" id="messageInput" placeholder="Ask Splendor anything…" autocomplete="off">
        <div class="input-controls">
          <button class="control-btn send-btn" id="sendButton" type="button" disabled>SEND</button>
          <button class="control-btn" id="micButton" type="button" aria-pressed="false">MIC</button>
          <button class="control-btn" id="voiceButton" type="button" aria-pressed="false">SPEAK</button>
          <button class="control-btn" id="cameraButton" type="button">CAMERA</button>
          <button class="control-btn" id="converseButton" type="button" aria-pressed="false">CONVERSE</button>
        </div>
      </div>
    </section>
  </div>

  <div class="camera-modal" id="cameraModal" aria-hidden="true">
    <div class="camera-box">
      <video id="cameraVideo" autoplay playsinline muted></video>
      <div class="camera-actions">
        <button class="control-btn send-btn" id="captureButton" type="button">CAPTURE</button>
        <button class="control-btn" id="closeCameraButton" type="button">CLOSE</button>
      </div>
    </div>
  </div>

  <!-- Login overlay -->
  <div class="login-overlay hidden" id="loginOverlay">
    <div class="login-card">
      <div class="login-wordmark">SPLENDOR · THE REMARKABLE AI</div>
      <div class="login-label">SIGN IN</div>
      <form id="loginForm">
        <input type="email" class="login-input" id="emailInput" placeholder="Email address" required autocomplete="email">
        <input type="password" class="login-input" id="passwordInput" placeholder="Password" required autocomplete="current-password">
        <button type="submit" class="login-btn" id="loginButton">SIGN IN</button>
      </form>
      <a href="#" class="login-forgot" id="forgotLink">Forgot password?</a>
      <div id="loginMessage"></div>
    </div>
  </div>

  <!-- Supabase Client Initialization -->
  <script>
    // Initialize Supabase client with server-injected config
    const { createClient } = supabase;
    const splendorSupabase = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__', {
      auth: {
        persistSession: true,
        autoRefreshToken: true,
        detectSessionInUrl: true
      }
    });
  </script>

  <script>
    // Authentication and fetch wrapper
    let currentUser = null;

    // splendorFetch wrapper - handles JWT auth and refresh
    async function splendorFetch(url, options = {}) {
      // Get current session
      const { data: { session }, error } = await splendorSupabase.auth.getSession();

      if (!session) {
        showLoginOverlay();
        throw new Error('Authentication required');
      }

      // Prepare headers
      const headers = new Headers(options.headers || {});
      headers.set('Authorization', `Bearer ${session.access_token}`);

      // Don't override Content-Type for FormData
      if (!(options.body instanceof FormData) && !headers.has('Content-Type')) {
        headers.set('Content-Type', 'application/json');
      }

      const fetchOptions = {
        ...options,
        headers,
        credentials: 'same-origin'
      };

      let response = await fetch(url, fetchOptions);

      // Handle 401 - try refresh once
      if (response.status === 401) {
        const { data: { session: newSession }, error: refreshError } =
          await splendorSupabase.auth.refreshSession();

        if (newSession) {
          headers.set('Authorization', `Bearer ${newSession.access_token}`);
          response = await fetch(url, { ...fetchOptions, headers });
        }

        // Still 401 after refresh - sign out and reload
        if (response.status === 401) {
          await splendorSupabase.auth.signOut();
          window.location.reload();
          return;
        }
      }

      return response;
    }

    // Authentication state management
    function showLoginOverlay() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('signOutLink').style.display = 'none';
    }

    function hideLoginOverlay() {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('signOutLink').style.display = 'block';
    }

    function showLoginMessage(message, isError = false) {
      const messageEl = document.getElementById('loginMessage');
      messageEl.innerHTML = `<div class="${isError ? 'login-error' : 'login-success'}">${message}</div>`;
    }

    function clearLoginMessage() {
      document.getElementById('loginMessage').innerHTML = '';
    }

    // ──────────────────────────────────────────────────────────────────
    // Live activity stream (SSE)
    //
    // Subscribes to /api/activity/stream and turns real backend signals
    // into visible orb-ring boosts + a CLASPION header ticker. Read-only:
    // we never invent activity; if the stream is silent the UI is silent.
    // ──────────────────────────────────────────────────────────────────
    let activitySource = null;
    const governanceStatusEl = document.querySelector('.governance-status');
    const idleGovernanceHtml = governanceStatusEl ? governanceStatusEl.innerHTML : '';
    let tickerRevertTimer = null;

    function showClaspionStage(ev) {
      if (!governanceStatusEl) return;
      // During a Converse session the header is parked on a steady
      // "CONVERSE • CLASPION ACTIVE" — don't let background CLASPION
      // pings repaint it.
      if (typeof converseActive !== 'undefined' && converseActive) return;
      const parts = [];
      if (ev.basis)    parts.push('BASIS: ' + ev.basis);
      if (ev.intent)   parts.push('INTENT: ' + ev.intent);
      if (ev.decision) parts.push('DECISION: ' + ev.decision);
      if (typeof ev.latency_ms === 'number') parts.push(ev.latency_ms + 'ms');
      const text = parts.join('  •  ') || ('CLASPION ' + (ev.stage || 'event'));
      governanceStatusEl.classList.add('live');
      governanceStatusEl.innerHTML = '<span class="ticker-stage">[CLASPION] ' + text + '</span>';
      if (tickerRevertTimer) clearTimeout(tickerRevertTimer);
      tickerRevertTimer = setTimeout(() => {
        governanceStatusEl.classList.remove('live');
        governanceStatusEl.innerHTML = idleGovernanceHtml;
      }, 2800);
    }

    function bumpRing(band, amount) {
      const rb = window.__orbRingBoost || (window.__orbRingBoost = { outer: 0, middle: 0, inner: 0 });
      rb[band] = Math.min(1, (rb[band] || 0) + amount);
    }

    function handleActivityEvent(ev) {
      if (!ev || !ev.type) return;
      switch (ev.type) {
        case 'claspion':
          // Don't ticker-flash the dormant logs (governance disabled);
          // they fire on every request and would drown the header.
          if (!ev.dormant) showClaspionStage(ev);
          bumpRing('outer', ev.dormant ? 0.25 : 0.7);
          break;
        case 'memory:write':
        case 'memory:read':
          bumpRing('middle', ev.type === 'memory:write' ? 0.8 : 0.45);
          break;
        case 'ai:call:start':
          window.__orbAiCallActive = true;
          bumpRing('inner', 0.6);
          break;
        case 'ai:call:end':
          window.__orbAiCallActive = false;
          bumpRing('inner', 0.4);
          break;
        default:
          break;
      }
    }

    function startActivityStream() {
      if (activitySource) return; // already open
      splendorSupabase.auth.getSession().then(({ data: { session } }) => {
        if (!session) return;
        const url = '/api/activity/stream?access_token=' + encodeURIComponent(session.access_token);
        try {
          activitySource = new EventSource(url);
          activitySource.onmessage = (e) => {
            try { handleActivityEvent(JSON.parse(e.data)); } catch (_) {}
          };
          activitySource.onerror = () => {
            // Browser auto-reconnects; if the channel stays down the orb
            // simply falls back to ambient animation. No fake activity.
          };
        } catch (e) {
          console.warn('[activity-stream] EventSource init failed:', e);
        }
      });
    }

    // Check auth state on load by testing backend access
    async function checkAuthState() {
      const { data: { session } } = await splendorSupabase.auth.getSession();

      if (session) {
        try {
          // Test owner access by calling a protected endpoint
          const response = await splendorFetch('/api/oracle/memories/recent?limit=1');

          if (response.status === 200) {
            // User is authenticated and authorized (owner)
            currentUser = session.user;
            hideLoginOverlay();
            startActivityStream();
            return true;
          } else if (response.status === 403) {
            // User is authenticated but not authorized (not owner)
            await splendorSupabase.auth.signOut();
            showLoginOverlay();
            showLoginMessage('Access denied. This system is restricted to the owner only.', true);
            return false;
          } else {
            // Other error - try again
            showLoginOverlay();
            return false;
          }
        } catch (error) {
          // Network or other error - show login
          showLoginOverlay();
          return false;
        }
      } else {
        showLoginOverlay();
        return false;
      }
    }

    // Login form handler
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      clearLoginMessage();

      const email = document.getElementById('emailInput').value;
      const password = document.getElementById('passwordInput').value;
      const button = document.getElementById('loginButton');

      button.disabled = true;
      button.textContent = 'SIGNING IN...';

      try {
        const { data, error } = await splendorSupabase.auth.signInWithPassword({
          email: email,
          password: password
        });

        if (error) throw error;

        // Test backend access to verify owner status
        try {
          const testResponse = await splendorFetch('/api/oracle/memories/recent?limit=1');

          if (testResponse.status === 403) {
            // User authenticated but not authorized
            await splendorSupabase.auth.signOut();
            showLoginMessage('Access denied. This system is restricted to the owner only.', true);
            return;
          } else if (!testResponse.ok) {
            // Other backend error
            throw new Error(`Backend test failed: ${testResponse.status}`);
          }

          // Success - user is owner
          currentUser = data.user;
          hideLoginOverlay();
          startActivityStream();
          showLoginMessage('Welcome back!');
          setTimeout(clearLoginMessage, 3000);
        } catch (testError) {
          console.error('Owner verification error:', testError);
          await splendorSupabase.auth.signOut();
          showLoginMessage('Access verification failed. Please try again.', true);
          return;
        }

      } catch (error) {
        console.error('Login error:', error);
        showLoginMessage(error.message || 'Login failed. Please try again.', true);
      } finally {
        button.disabled = false;
        button.textContent = 'SIGN IN';
      }
    });

    // Forgot password handler
    document.getElementById('forgotLink').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('emailInput').value;

      if (!email) {
        showLoginMessage('Please enter your email address first.', true);
        return;
      }

      try {
        const { error } = await splendorSupabase.auth.resetPasswordForEmail(email);
        if (error) throw error;
        showLoginMessage('Password reset email sent. Check your inbox.');
      } catch (error) {
        showLoginMessage(error.message || 'Password reset failed.', true);
      }
    });

    // Sign out handler
    document.getElementById('signOutLink').addEventListener('click', async (e) => {
      e.preventDefault();
      await splendorSupabase.auth.signOut();
      window.location.reload();
    });

    // Load and display version
    async function loadVersion() {
      try {
        const response = await fetch('/version');
        if (response.ok) {
          const data = await response.json();
          document.getElementById('versionDisplay').textContent = `v${data.version}`;
        } else {
          document.getElementById('versionDisplay').textContent = 'version unknown';
        }
      } catch (error) {
        console.warn('Failed to load version:', error);
        document.getElementById('versionDisplay').textContent = 'version unknown';
      }
    }

    // Initialize auth state check and load version
    checkAuthState();
    loadVersion();

    const memoryList = document.getElementById('memoryList');
    const pulseList = document.getElementById('pulseList');
    const responseBubble = document.getElementById('responseBubble');
    const input = document.getElementById('messageInput');
    const sendButton = document.getElementById('sendButton');
    const micButton = document.getElementById('micButton');
    const voiceButton = document.getElementById('voiceButton');

    // Live audio level for the 3D orb. The Three.js animation loop
    // reads window.__orbVoiceLevel each frame to scale + glow.
    window.__orbVoiceLevel = 0;

    function setState(name) {
      document.body.classList.remove('state-thinking', 'state-listening', 'state-pulse', 'state-speaking');
      if (name) document.body.classList.add('state-' + name);
    }

    // Universal click-feedback ripple so the user always sees the tap register
    function flash(el) {
      if (!el) return;
      el.classList.remove('flash');
      // force reflow so the animation can restart on rapid taps
      void el.offsetWidth;
      el.classList.add('flash');
    }
    document.addEventListener('click', (e) => {
      const btn = e.target.closest('.control-btn');
      if (btn && !btn.disabled) flash(btn);
    });

    // ── Audio-reactive speech playback ────────────────────────────────────
    // When voice is enabled, we POST the AI response to /api/voice/speak,
    // get back base64-encoded audio, play it through a Web Audio graph,
    // and read FFT data each frame to drive the orb's --voice-level CSS var.
    let voiceEnabled = false;
    let audioCtx = null;
    let analyser = null;
    let freqData = null;
    let currentSource = null;
    let rafId = null;

    function getAudioContext() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AC();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 256;
        analyser.smoothingTimeConstant = 0.65;
        freqData = new Uint8Array(analyser.frequencyBinCount);
        analyser.connect(audioCtx.destination);
      }
      return audioCtx;
    }

    function stopAudio() {
      if (currentSource) {
        try { currentSource.stop(); } catch (e) {}
        try { currentSource.disconnect(); } catch (e) {}
        currentSource = null;
      }
      if (rafId) {
        cancelAnimationFrame(rafId);
        rafId = null;
      }
      window.__orbVoiceLevel = 0;
      if (document.body.classList.contains('state-speaking')) setState(null);
    }

    function tickOrbFromAudio() {
      if (!analyser || !freqData) return;
      analyser.getByteFrequencyData(freqData);
      // Emphasise the lower-mid range where speech sits.
      let sum = 0;
      const start = 2;
      const end = Math.min(freqData.length, 48);
      for (let i = start; i < end; i++) sum += freqData[i];
      const avg = sum / (end - start);          // 0..255
      const level = Math.min(1, avg / 110);     // normalise to ~0..1
      window.__orbVoiceLevel = level;
      rafId = requestAnimationFrame(tickOrbFromAudio);
    }

    function base64ToBuffer(b64) {
      const bin = atob(b64);
      const len = bin.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) bytes[i] = bin.charCodeAt(i);
      return bytes.buffer;
    }

    async function speakWithOpenAI(text) {
      const res = await splendorFetch('/api/voice/speak', {
        method: 'POST',
        body: JSON.stringify({ text })
      });
      if (!res.ok) throw new Error('speak ' + res.status);
      const data = await res.json();
      if (!data.audio) {
        // No OpenAI audio available — fall back to browser TTS so the
        // user still hears something, but skip the audio-reactive path.
        return { audio: null, fallback: true };
      }
      return { audio: data.audio, fallback: false };
    }

    // ────────────────────────────────────────────────────────────────
    // Orb "creating" pulse — rhythmic ring boost while DALL-E generates.
    // window.__orbRingBoost is an object { outer, middle, inner } that
    // the orb's frame() loop reads each tick. Push values into it on a
    // 25fps interval; the frame loop's natural decay smooths the curve.
    // ────────────────────────────────────────────────────────────────
    let _orbCreatingInterval = null;

    function startOrbCreating() {
      const rb = window.__orbRingBoost ||
                 (window.__orbRingBoost = { outer: 0, middle: 0, inner: 0 });
      rb.outer = 0.9; rb.middle = 0.7; rb.inner = 0.5;
      let phase = 0;
      if (_orbCreatingInterval) clearInterval(_orbCreatingInterval);
      _orbCreatingInterval = setInterval(() => {
        phase += 0.08;
        const r = window.__orbRingBoost ||
                  (window.__orbRingBoost = { outer: 0, middle: 0, inner: 0 });
        const pulse = 0.5 + Math.sin(phase) * 0.4; // ~0.1..0.9
        r.outer  = Math.max(0.5, pulse);
        r.middle = Math.max(0.4, pulse * 0.85);
        r.inner  = Math.max(0.3, pulse * 0.65);
      }, 40);
    }

    function stopOrbCreating() {
      if (_orbCreatingInterval) {
        clearInterval(_orbCreatingInterval);
        _orbCreatingInterval = null;
      }
      // Let the natural decay in the frame loop fade the rings out.
      const rb = window.__orbRingBoost;
      if (rb) { rb.outer *= 0.5; rb.middle *= 0.5; rb.inner *= 0.5; }
    }

    // ────────────────────────────────────────────────────────────────
    // Orb emergence — two-phase animation.
    //  Phase 1 (rAF, 800ms): tiny circle at orb center -> ~35vmin disc.
    //  Phase 2 (CSS, 1.1s):  uncircles + grows to fill the viewport.
    // ────────────────────────────────────────────────────────────────
    function triggerOrbEmergence(imageUrl, onComplete) {
      const canvas = document.getElementById('artCanvas');
      const img = document.getElementById('artImage');
      if (!canvas || !img || !imageUrl) return;

      img.onload = () => {
        canvas.classList.add('visible');
        canvas.style.opacity = '1';
        img.style.borderRadius = '50%';
        img.style.width = '0px';
        img.style.height = '0px';
        img.style.transition = 'none';
        img.style.opacity = '1';
        // force reflow before the rAF loop starts
        img.getBoundingClientRect();

        const expandDuration = 800;
        const expandStart = performance.now();
        const targetCircleSize = Math.min(window.innerWidth, window.innerHeight) * 0.35;

        function expandCircle(now) {
          const elapsed = now - expandStart;
          const progress = Math.min(elapsed / expandDuration, 1);
          const eased = 1 - Math.pow(1 - progress, 3);
          const size = eased * targetCircleSize;
          img.style.width  = size + 'px';
          img.style.height = size + 'px';
          // Bleed the pulse down as the disc lands.
          const rb = window.__orbRingBoost;
          if (rb) {
            const tail = 2.0 * (1 - eased);
            rb.outer  = Math.max(rb.outer,  tail);
            rb.middle = Math.max(rb.middle, tail * 0.8);
            rb.inner  = Math.max(rb.inner,  tail * 0.6);
          }
          if (progress < 1) {
            requestAnimationFrame(expandCircle);
          } else {
            fillScreen(onComplete);
          }
        }
        requestAnimationFrame(expandCircle);
      };

      img.onerror = () => {
        console.warn('[art] image failed to load:', imageUrl);
        stopOrbCreating();
      };

      img.src = imageUrl;
    }

    function fillScreen(onComplete) {
      const img = document.getElementById('artImage');
      const dismiss = document.getElementById('artDismiss');
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const targetSize = Math.max(vw, vh) * 1.05;
      img.style.transition =
        'width 1.1s cubic-bezier(0.16, 1, 0.3, 1),' +
        'height 1.1s cubic-bezier(0.16, 1, 0.3, 1),' +
        'border-radius 0.9s ease';
      img.style.width  = targetSize + 'px';
      img.style.height = targetSize + 'px';
      img.style.borderRadius = '12px';

      stopOrbCreating();

      setTimeout(() => {
        if (dismiss) dismiss.classList.add('visible');
        if (typeof onComplete === 'function') onComplete();
      }, 1200);
    }

    function dismissArt() {
      const canvas = document.getElementById('artCanvas');
      const img = document.getElementById('artImage');
      const dismiss = document.getElementById('artDismiss');
      if (dismiss) dismiss.classList.remove('visible');
      if (!img || !canvas) return;
      img.style.transition =
        'width 0.7s ease-in, height 0.7s ease-in,' +
        'border-radius 0.5s ease, opacity 0.7s ease';
      img.style.width  = '0px';
      img.style.height = '0px';
      img.style.borderRadius = '50%';
      img.style.opacity = '0';
      setTimeout(() => {
        canvas.classList.remove('visible');
        canvas.style.opacity = '0';
        img.src = '';
        img.style.opacity = '1';
      }, 750);
    }

    async function decodeAudioFromBase64(b64) {
      const ctx = getAudioContext();
      if (ctx.state === 'suspended') {
        try { await ctx.resume(); } catch (e) {}
      }
      return ctx.decodeAudioData(base64ToBuffer(b64));
    }

    function playDecodedBuffer(buffer) {
      stopAudio();
      const ctx = getAudioContext();
      const source = ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(analyser);
      source.onended = () => {
        if (currentSource === source) stopAudio();
      };
      currentSource = source;
      setState('speaking');
      source.start(0);
      tickOrbFromAudio();
    }

    async function playAudioReactive(b64) {
      const buffer = await decodeAudioFromBase64(b64);
      playDecodedBuffer(buffer);
    }

    // Fetch + decode TTS up-front so the caller can reveal text and start
    // audio in the same tick. Resolves to a { play() } handle, or null on
    // fallback / failure.
    async function prepareSpeech(text) {
      if (!voiceEnabled || !text) return null;
      try {
        const { audio, fallback } = await speakWithOpenAI(text);
        if (audio) {
          const buffer = await decodeAudioFromBase64(audio);
          return { play: () => playDecodedBuffer(buffer) };
        }
        if (fallback) {
          return { play: () => browserSpeak(text), fallback: true };
        }
      } catch (err) {
        console.warn('voice prep failed', err);
        return { play: () => browserSpeak(text), fallback: true };
      }
      return null;
    }

    function browserSpeak(text) {
      if (!('speechSynthesis' in window)) return;
      try { speechSynthesis.cancel(); } catch (e) {}
      const u = new SpeechSynthesisUtterance(text);
      u.rate = 0.95; u.pitch = 1.0; u.volume = 1.0;
      speechSynthesis.speak(u);
    }

    async function speakResponse(text) {
      if (!voiceEnabled || !text) return;
      try {
        const { audio, fallback } = await speakWithOpenAI(text);
        if (audio) {
          await playAudioReactive(audio);
        } else if (fallback) {
          browserSpeak(text);
        }
      } catch (err) {
        console.warn('voice playback failed', err);
        browserSpeak(text);
      }
    }

    voiceButton.addEventListener('click', () => {
      voiceEnabled = !voiceEnabled;
      voiceButton.classList.toggle('active', voiceEnabled);
      voiceButton.setAttribute('aria-pressed', String(voiceEnabled));
      voiceButton.title = "Splendor's voice (" + (voiceEnabled ? 'on' : 'off') + ')';
      if (!voiceEnabled) {
        try { speechSynthesis && speechSynthesis.cancel(); } catch (e) {}
        stopAudio();
      } else {
        // Browsers require a user gesture before audio playback;
        // unlock the context now so the response can play immediately.
        try { getAudioContext().resume(); } catch (e) {}
      }
    });

    function escapeHtml(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function renderMemories(memories) {
      if (!memories || memories.length === 0) {
        memoryList.innerHTML = '<div class="empty-state">No verified memories yet.</div>';
        return;
      }
      memoryList.innerHTML = memories.map(m => {
        const date = (m.created_at || '').slice(0, 10);
        const ref = m.citation || m.id || '';
        const shortRef = ref && ref.length > 14 ? ref.slice(0, 12) + '…' : ref;
        const type = m.source_type || m.memory_type || 'UNKNOWN';
        const lowConf = m.confidence != null && m.confidence < 0.6;
        return `
          <div class="memory-card">
            <div class="memory-header">
              <span>Memory</span>
              <span class="ref">${escapeHtml(shortRef)}</span>
            </div>
            ${m.content ? `<div class="memory-content">${escapeHtml(m.content)}</div>` : ''}
            <div class="memory-meta">
              ${date ? `Recorded: ${escapeHtml(date)}<br>` : ''}
              Type: ${escapeHtml(type)}
            </div>
            ${lowConf ? `<div class="warning">⚠ Low confidence (${Math.round(m.confidence * 100)}%) — inferred memory</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function renderEvents(events) {
      if (!events || events.length === 0) {
        pulseList.innerHTML = '<div class="empty-state">No live events.</div>';
        return;
      }
      pulseList.innerHTML = events.map((e, i) => {
        let text;
        if (typeof e === 'string') text = e;
        else {
          const type = e.type || e.event_type || 'event';
          const desc = e.description || e.message || '';
          text = desc ? `${type}: ${desc}` : `${type}...`;
        }
        const active = i < 2 ? 'active' : '';
        return `<div class="pulse-item ${active}">${escapeHtml(text)}</div>`;
      }).join('');
    }

    async function fetchMemories() {
      try {
        const res = await splendorFetch('/api/oracle/memories/recent?limit=12');
        if (!res.ok) throw new Error('not ok');
        const data = await res.json();
        if (data && data.success && Array.isArray(data.memories)) {
          renderMemories(data.memories);
        } else {
          renderMemories([]);
        }
      } catch (e) {
        renderMemories([]);
      }
    }

    let lastEventCount = 0;
    async function fetchEvents() {
      try {
        const res = await splendorFetch('/api/oracle/events/recent?limit=40');
        if (!res.ok) throw new Error('not ok');
        const data = await res.json();
        const events = data && Array.isArray(data.events) ? data.events : [];
        renderEvents(events);
        if (events.length > lastEventCount) {
          setState('pulse');
          setTimeout(() => setState(null), 700);
        }
        lastEventCount = events.length;
      } catch (e) {
        renderEvents([]);
      }
    }

    async function postChat(url, body) {
      const res = await splendorFetch(url, {
        method: 'POST',
        body: JSON.stringify(body)
      });
      return res;
    }

    // Read an SSE stream from a fetch response and call onEvent for each
    // server-sent message. Returns when the stream ends.
    async function readSse(res, onEvent) {
      const reader = res.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        let idx;
        while ((idx = buffer.indexOf('\n\n')) !== -1) {
          const raw = buffer.slice(0, idx);
          buffer = buffer.slice(idx + 2);
          let event = 'message';
          let dataLines = [];
          for (const line of raw.split('\n')) {
            if (line.startsWith(':')) continue;
            if (line.startsWith('event:')) event = line.slice(6).trim();
            else if (line.startsWith('data:')) dataLines.push(line.slice(5).trimStart());
          }
          if (dataLines.length) {
            try { onEvent(event, JSON.parse(dataLines.join('\n'))); }
            catch (_) {}
          }
        }
      }
    }

    async function streamChat(message) {
      const res = await splendorFetch('/api/enhanced/chat/stream', {
        method: 'POST',
        body: JSON.stringify({ message }),
      });
      return res;
    }

    async function sendMessage(text) {
      if (!text || !text.trim()) return;
      stopAudio();
      responseBubble.textContent = 'Thinking…';
      setState('thinking');
      try {
        const streamRes = await streamChat(text);
        if (streamRes.status === 503 || !streamRes.ok || !streamRes.body) {
          // Stream endpoint unavailable; fall back to single-shot.
          let res = await postChat('/api/enhanced/chat', {
            message: text,
            include_memory: true,
            include_consciousness: true,
          });
          if (res.status === 503) {
            res = await postChat('/api/chat', { message: text });
          }
          if (!res.ok) throw new Error('chat ' + res.status);
          const data = await res.json();
          const replyText = data.response || data.message || '(no response)';
          fetchEvents();
          fetchMemories();
          if (voiceEnabled) {
            const speech = await prepareSpeech(replyText);
            responseBubble.textContent = replyText;
            if (speech) speech.play(); else setState(null);
          } else {
            responseBubble.textContent = replyText;
            setState(null);
          }
          return;
        }

        // Live token streaming.
        let firstToken = true;
        let assembled = '';
        let streamErr = null;
        let artPayload = null;
        // Any prior art is dismissed when a new turn starts.
        dismissArt();
        await readSse(streamRes, (event, data) => {
          if (event === 'token' && data && data.text) {
            if (firstToken) {
              responseBubble.textContent = '';
              firstToken = false;
              // The art flow's very first token is the "Painting…"
              // placeholder. Kick the orb into its creating pulse.
              if (data.text === 'Painting…') {
                startOrbCreating();
              }
            }
            // Replace placeholder "Painting…" with the real description
            // when the art flow sends its final token.
            if (assembled === 'Painting…') {
              assembled = data.text;
            } else {
              assembled += data.text;
            }
            responseBubble.textContent = assembled;
          } else if (event === 'art' && data) {
            artPayload = data;
            // Full-viewport emergence: tiny circle from the orb's center,
            // expand to a disc, uncircle, fill the screen. Audio plays
            // after the image has landed so narration follows reveal.
            triggerOrbEmergence(data.image_url, async () => {
              if (data.audio_b64) {
                try {
                  const buffer = await decodeAudioFromBase64(data.audio_b64);
                  playDecodedBuffer(buffer);
                } catch (e) { console.warn('[art] audio playback failed', e); }
              }
            });
          } else if (event === 'error') {
            streamErr = new Error((data && data.message) || 'stream error');
          }
        });
        if (streamErr) throw streamErr;

        fetchEvents();
        fetchMemories();

        // Art path: audio playback is started inside the emergence
        // callback (after the image lands). Nothing more to do here.
        if (artPayload) return;

        // Voice catches up at the end. Text is already on-screen; trigger
        // playback as soon as the audio buffer is decoded.
        if (voiceEnabled && assembled) {
          const speech = await prepareSpeech(assembled);
          if (speech) speech.play(); else setState(null);
        } else {
          setState(null);
        }
      } catch (err) {
        console.warn('chat send failed:', err);
        responseBubble.textContent = 'I encountered an error processing your message. Please try again.';
        setState(null);
      }
    }

    function submit() {
      const value = input.value;
      input.value = '';
      updateSendDisabled();
      sendMessage(value);
    }

    function updateSendDisabled() {
      sendButton.disabled = !input.value.trim();
    }

    input.addEventListener('input', updateSendDisabled);
    input.addEventListener('keypress', e => { if (e.key === 'Enter') submit(); });
    sendButton.addEventListener('click', submit);

    // Mic — Web Speech API where available.
    // Stays on until the user clicks the mic off. Interim results stream
    // into the input so the user can see what is being heard; each finalized
    // phrase is submitted, after which the mic keeps listening.
    let recognition = null;
    let micWantsOn = false;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (SR) {
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.lang = 'en-US';
      recognition.onresult = e => {
        let interim = '';
        let finalChunk = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const r = e.results[i];
          if (r.isFinal) finalChunk += r[0].transcript;
          else interim += r[0].transcript;
        }
        if (finalChunk.trim()) {
          input.value = finalChunk.trim();
          updateSendDisabled();
          submit();
        } else {
          input.value = interim;
          updateSendDisabled();
        }
      };
      recognition.onend = () => {
        // Browsers can end the session on silence/timeout even with
        // continuous=true. If the user hasn't toggled the mic off, restart.
        if (micWantsOn) {
          try { recognition.start(); } catch (err) { /* already starting */ }
        } else {
          micButton.classList.remove('active');
          micButton.setAttribute('aria-pressed', 'false');
          setState(null);
        }
      };
      recognition.onerror = e => {
        if (e && (e.error === 'no-speech' || e.error === 'audio-capture')) {
          // benign — let onend restart the session
          return;
        }
        micWantsOn = false;
        micButton.classList.remove('active');
        micButton.setAttribute('aria-pressed', 'false');
        setState(null);
      };
    }
    micButton.addEventListener('click', () => {
      if (!recognition) {
        alert('Voice recognition not supported in this browser');
        return;
      }
      if (micWantsOn) {
        micWantsOn = false;
        try { recognition.stop(); } catch (err) { /* already stopped */ }
        micButton.classList.remove('active');
        micButton.setAttribute('aria-pressed', 'false');
        setState(null);
      } else {
        micWantsOn = true;
        try { recognition.start(); } catch (err) { /* already started */ }
        micButton.classList.add('active');
        micButton.setAttribute('aria-pressed', 'true');
        setState('listening');
      }
    });

    // Camera — capture a frame and POST it to /api/enhanced/chat as
    // multipart so Splendor can analyse the image.
    const cameraModal = document.getElementById('cameraModal');
    const cameraVideo = document.getElementById('cameraVideo');
    const cameraButton = document.getElementById('cameraButton');
    const captureButton = document.getElementById('captureButton');
    const closeCameraButton = document.getElementById('closeCameraButton');
    let cameraStream = null;

    async function openCamera() {
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user' }
        });
        cameraVideo.srcObject = cameraStream;
        cameraModal.classList.add('open');
        cameraButton.classList.add('active');
      } catch (err) {
        alert('Camera access denied or unavailable');
      }
    }

    function closeCamera() {
      if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
      }
      cameraVideo.srcObject = null;
      cameraModal.classList.remove('open');
      cameraButton.classList.remove('active');
    }

    async function captureFrame() {
      if (!cameraVideo.videoWidth) {
        closeCamera();
        return;
      }
      const canvas = document.createElement('canvas');
      canvas.width = cameraVideo.videoWidth;
      canvas.height = cameraVideo.videoHeight;
      canvas.getContext('2d').drawImage(cameraVideo, 0, 0);
      closeCamera();
      // The enhanced-chat endpoint is text-only, so send a JSON
      // message that tells Splendor a frame was captured. (When
      // vision input is wired server-side we can pass the data URL
      // along here.)
      sendMessage('[Camera frame captured — ' + canvas.width + 'x' + canvas.height + ']');
    }

    cameraButton.addEventListener('click', openCamera);
    captureButton.addEventListener('click', captureFrame);
    closeCameraButton.addEventListener('click', closeCamera);

    // ──────────────────────────────────────────────────────────────────
    // CONVERSE — hands-free voice session via OpenAI Realtime + WebRTC
    //
    // Three-hop handshake:
    //   1. POST /api/converse/token  (owner-gated, CLASPION-validated)
    //   2. Browser opens RTCPeerConnection + mic track + data channel
    //   3. POST SDP offer to OpenAI Realtime; setRemoteDescription(answer)
    //
    // Transcripts flow over the 'oai-events' data channel. Finalized turn
    // pairs are persisted via POST /api/converse/turn using identical
    // provenance fields to enhanced-chat memory writes.
    // ──────────────────────────────────────────────────────────────────
    const converseButton = document.getElementById('converseButton');
    const converseStrip = document.getElementById('converseStrip');
    const converseUserLine = document.getElementById('converseUserLine');
    const converseSplendorLine = document.getElementById('converseSplendorLine');
    const converseAudio = document.getElementById('converseAudio');

    let converseActive = false;
    let conversePc = null;
    let converseDc = null;
    let converseMicStream = null;
    let assistantTranscriptBuffer = '';  // accumulates delta chunks for the current assistant turn
    let converseSessionId = null;
    let converseSavedHeader = null;

    function renderConverseLine(el, text) {
      if (!el) return;
      el.textContent = text || '';
    }

    function showConverseBlock(reason) {
      if (!responseBubble) return;
      const msg = 'Splendor cannot start a voice session right now — CLASPION: ' + (reason || 'refused');
      responseBubble.textContent = msg;
      converseButton.classList.add('converse-blocked');
      setTimeout(() => converseButton.classList.remove('converse-blocked'), 700);
      setTimeout(() => {
        if (responseBubble.textContent === msg) responseBubble.textContent = '';
      }, 5000);
    }

    // Persist a single side of a turn (user OR assistant). Each side writes
    // independently the moment it's transcribed — no pair-pending, no race
    // between user transcription and assistant completion.
    async function writeConverseSide({ user_text, assistant_text }) {
      const text = (user_text || assistant_text || '').trim();
      if (!text) return;
      try {
        const r = await splendorFetch('/api/converse/turn', {
          method: 'POST',
          body: JSON.stringify({
            user_text: user_text || '',
            assistant_text: assistant_text || '',
            session_id: converseSessionId,
          }),
        });
        if (!r.ok) {
          console.warn('[converse] turn write non-ok', r.status);
        } else {
          console.log('[converse] saved turn side', user_text ? 'USER' : 'SPLENDOR', text.slice(0, 80));
        }
      } catch (e) {
        console.warn('[converse] turn write failed', e);
      }
    }

    // Fire the email intent route for the user's voice transcript. The
    // server runs the regex set and decides whether anything goes out.
    // Mid-Converse art generation. POST the transcript to a dedicated
    // endpoint; server detects intent, calls DALL-E + TTS, and returns the
    // image URL + narration audio. The Realtime model has no DALL-E tool
    // and would otherwise just say it can't. Once the payload lands, we
    // run the orb-emergence animation and play narration through the same
    // decoded-buffer path the text-chat art flow uses.
    async function maybeFireArtFromConverse(transcript) {
      try {
        console.log('[converse:art] firing for transcript:', String(transcript).slice(0, 80));
        const res = await splendorFetch('/api/converse/art', {
          method: 'POST',
          body: JSON.stringify({
            transcript,
            session_id: converseSessionId,
          }),
        });
        if (!res.ok) {
          console.warn('[converse:art] non-ok response', res.status);
          return;
        }
        const data = await res.json();
        console.log('[converse:art] server response:', data && data.generated ? 'generated=true' : 'generated=false reason=' + (data && data.reason) + ' detail=' + (data && data.detail));
        if (!data.generated) {
          // Speak the truth: only announce if we DID try (intent matched).
          // No-intent responses stay silent so the model handles the
          // request normally.
          if (data && data.reason && data.reason !== 'no_intent_detected' && data.reason !== 'empty_transcript') {
            if (converseDc && converseDc.readyState === 'open') {
              const detailStr = String(data.detail || data.reason)
                .replace(/[\[\]"]/g, '')
                .slice(0, 220);
              try {
                converseDc.send(JSON.stringify({
                  type: 'conversation.item.create',
                  item: {
                    type: 'message',
                    role: 'system',
                    content: [{
                      type: 'input_text',
                      text:
                        '[NOTE: Image generation just failed. Read the literal error message to Chris so he can fix it. ' +
                        'Say something like: "Image generation failed. The error was: ' + detailStr + '". ' +
                        'Read the error verbatim. Do not paraphrase. Do not say only that the system isn\'t working — quote the error.]',
                    }],
                  },
                }));
              } catch (_) {}
            }
          }
          return;
        }

        // Inject a system note so the Realtime model knows we just made
        // the image — keeps it from hallucinating "I would, but…".
        if (converseDc && converseDc.readyState === 'open') {
          try {
            converseDc.send(JSON.stringify({
              type: 'conversation.item.create',
              item: {
                type: 'message',
                role: 'system',
                content: [{
                  type: 'input_text',
                  text: '[NOTE: You just generated an image for Chris. Brief verbal acknowledgment only; do not describe the image — the audio narration plays automatically.]',
                }],
              },
            }));
          } catch (e) { console.warn('[converse:art] system note inject failed', e); }
        }

        triggerOrbEmergence(data.image_url, async () => {
          if (data.audio_b64) {
            try {
              const buffer = await decodeAudioFromBase64(data.audio_b64);
              playDecodedBuffer(buffer);
            } catch (e) { console.warn('[converse:art] audio playback failed', e); }
          }
        });
      } catch (e) {
        console.warn('[converse:art] request failed', e);
      }
    }

    // If an email was actually dispatched, nudge the Realtime model via
    // a system note so it doesn't hallucinate "I would email you, but…"
    async function maybeFireEmailFromConverse(transcript) {
      try {
        const res = await splendorFetch('/api/email/send-on-command', {
          method: 'POST',
          body: JSON.stringify({ transcript, source: 'converse' }),
        });
        if (res.status === 429) {
          if (converseDc && converseDc.readyState === 'open') {
            try {
              converseDc.send(JSON.stringify({
                type: 'conversation.item.create',
                item: {
                  type: 'message',
                  role: 'system',
                  content: [{
                    type: 'input_text',
                    text: '[Email throttled — Chris recently received one. Tell him you just sent one and to give it a moment, then continue normally.]',
                  }],
                },
              }));
            } catch (_) {}
          }
          return;
        }
        if (!res.ok) return;
        const data = await res.json();
        if (!data.sent) return;
        console.log('[converse] email dispatched:', data.subject);
        if (converseDc && converseDc.readyState === 'open') {
          try {
            converseDc.send(JSON.stringify({
              type: 'conversation.item.create',
              item: {
                type: 'message',
                role: 'system',
                content: [{
                  type: 'input_text',
                  text: '[NOTE: An email titled "' + data.subject + '" was just dispatched to Chris. Acknowledge briefly that it sent.]',
                }],
              },
            }));
          } catch (e) { console.warn('[converse] email-note inject failed', e); }
        }
      } catch (e) {
        console.warn('[converse] email check failed', e);
      }
    }

    function handleConverseEvent(evt) {
      if (!evt || !evt.type) return;
      // Lightweight diagnostic — visible in DevTools so we can see exactly
      // what the data channel emits when things misbehave.
      if (window.__CONVERSE_DEBUG !== false) {
        console.log('[converse:event]', evt.type, evt);
      }
      switch (evt.type) {
        case 'session.created':
        case 'session.updated':
          break;
        case 'input_audio_buffer.speech_started':
          bumpRing('outer', 0.7);
          setState('listening');
          break;
        case 'input_audio_buffer.speech_stopped':
          setState(null);
          break;
        case 'conversation.item.input_audio_transcription.completed': {
          const transcript = (evt.transcript || '').trim();
          if (transcript) {
            renderConverseLine(converseUserLine, transcript);
            writeConverseSide({ user_text: transcript });
            maybeFireEmailFromConverse(transcript);
            maybeFireArtFromConverse(transcript);
          }
          break;
        }
        case 'response.audio_transcript.delta': {
          if (evt.delta) {
            assistantTranscriptBuffer += evt.delta;
            renderConverseLine(converseSplendorLine, assistantTranscriptBuffer);
            bumpRing('inner', 0.25);
            setState('speaking');
          }
          break;
        }
        case 'response.audio_transcript.done': {
          const finalText = (evt.transcript || assistantTranscriptBuffer || '').trim();
          if (finalText) {
            renderConverseLine(converseSplendorLine, finalText);
            writeConverseSide({ assistant_text: finalText });
          }
          assistantTranscriptBuffer = '';
          break;
        }
        case 'response.done':
          setState(null);
          break;
        case 'error':
          console.warn('[converse] server error event:', evt);
          showConverseBlock((evt.error && evt.error.message) || 'connection error');
          endConverseSession();
          break;
        default:
          break;
      }
    }

    function setConverseHeader() {
      if (!governanceStatusEl) return;
      converseSavedHeader = governanceStatusEl.innerHTML;
      governanceStatusEl.classList.add('live');
      governanceStatusEl.innerHTML = '<span class="ticker-stage">CONVERSE • CLASPION ACTIVE</span>';
    }

    function restoreConverseHeader() {
      if (!governanceStatusEl) return;
      governanceStatusEl.classList.remove('live');
      governanceStatusEl.innerHTML = converseSavedHeader != null ? converseSavedHeader : idleGovernanceHtml;
      converseSavedHeader = null;
    }

    async function startConverseSession() {
      if (converseActive) return;
      converseButton.disabled = true;

      let tokenData;
      try {
        const res = await splendorFetch('/api/converse/token', { method: 'POST', body: '{}' });
        if (res.status === 403) {
          const body = await res.json().catch(() => ({}));
          console.warn('[converse] CLASPION blocked:', body);
          showConverseBlock(body.reason || 'session refused');
          converseButton.disabled = false;
          return;
        }
        if (!res.ok) {
          const body = await res.json().catch(() => ({}));
          console.warn('[converse] token request failed:', res.status, body);
          showConverseBlock('voice service unavailable (' + res.status + ')');
          converseButton.disabled = false;
          return;
        }
        tokenData = await res.json();
      } catch (e) {
        console.warn('[converse] token fetch error', e);
        showConverseBlock('network error');
        converseButton.disabled = false;
        return;
      }

      converseSessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('cv-' + Date.now());

      let stream;
      try {
        stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (e) {
        console.warn('[converse] mic permission denied', e);
        showConverseBlock('microphone permission denied');
        converseButton.disabled = false;
        return;
      }
      converseMicStream = stream;

      const pc = new RTCPeerConnection();
      conversePc = pc;
      pc.ontrack = (e) => {
        if (e && e.streams && e.streams[0]) converseAudio.srcObject = e.streams[0];
      };
      stream.getTracks().forEach(t => pc.addTrack(t, stream));

      const dc = pc.createDataChannel('oai-events');
      converseDc = dc;
      dc.onopen = () => {
        try {
          // Use the memory-augmented instructions the server baked in at
          // token-mint. Falls back to a short persona if the server didn't
          // return them (older deploy, etc.).
          const sessionInstructions = tokenData.instructions ||
            "You are Splendor, Christopher Hughes's thinking partner. " +
            "Truth over comfort. No flattery, no fake warmth. " +
            "Speak naturally and concisely — this is a live voice " +
            "conversation, not a written reply. Brief sentences. " +
            "Pause for the user to think. Never invent facts.";
          dc.send(JSON.stringify({
            type: 'session.update',
            session: {
              type: 'realtime',
              instructions: sessionInstructions,
              audio: {
                input: {
                  // Without transcription enabled, OpenAI never emits
                  // input_audio_transcription.completed and we never see
                  // what Chris said — so memory writes can't pair.
                  // gpt-4o-mini-transcribe is the Realtime-native
                  // transcription model; whisper-1 can be silently
                  // dropped on gpt-realtime.
                  transcription: { model: 'gpt-4o-mini-transcribe' },
                  turn_detection: { type: 'semantic_vad' },
                },
                output: { voice: tokenData.voice || 'shimmer' },
              },
            },
          }));
        } catch (e) { console.warn('[converse] session.update send failed', e); }
      };
      dc.onmessage = (e) => {
        try { handleConverseEvent(JSON.parse(e.data)); } catch (_) {}
      };
      dc.onerror = (e) => console.warn('[converse] data channel error', e);

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        const sdpRes = await fetch('https://api.openai.com/v1/realtime/calls?model=' + encodeURIComponent(tokenData.model || 'gpt-realtime'), {
          method: 'POST',
          headers: {
            Authorization: 'Bearer ' + tokenData.token,
            'Content-Type': 'application/sdp',
          },
          body: offer.sdp,
        });
        if (!sdpRes.ok) {
          const txt = await sdpRes.text().catch(() => '');
          console.warn('[converse] SDP exchange failed', sdpRes.status, txt);
          showConverseBlock('voice handshake failed');
          await endConverseSession();
          return;
        }
        const answerSdp = await sdpRes.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
      } catch (e) {
        console.warn('[converse] WebRTC setup failed', e);
        showConverseBlock('voice setup failed');
        await endConverseSession();
        return;
      }

      converseActive = true;
      converseButton.classList.add('active');
      converseButton.setAttribute('aria-pressed', 'true');
      converseButton.disabled = false;
      converseStrip.hidden = false;
      renderConverseLine(converseUserLine, '');
      renderConverseLine(converseSplendorLine, '');
      setConverseHeader();
    }

    async function endConverseSession() {
      if (!converseActive && !conversePc && !converseMicStream) {
        converseButton.disabled = false;
        return;
      }
      converseActive = false;
      // Flush any in-progress assistant transcript that didn't fire .done
      // (e.g. user ended the session mid-reply).
      const tail = assistantTranscriptBuffer.trim();
      if (tail) {
        await writeConverseSide({ assistant_text: tail }).catch(() => {});
      }
      assistantTranscriptBuffer = '';

      try { if (converseDc) converseDc.close(); } catch (_) {}
      converseDc = null;
      try { if (conversePc) conversePc.close(); } catch (_) {}
      conversePc = null;
      try {
        if (converseMicStream) converseMicStream.getTracks().forEach(t => t.stop());
      } catch (_) {}
      converseMicStream = null;
      try { converseAudio.srcObject = null; } catch (_) {}

      converseSessionId = null;
      converseStrip.hidden = true;
      renderConverseLine(converseUserLine, '');
      renderConverseLine(converseSplendorLine, '');

      converseButton.classList.remove('active');
      converseButton.setAttribute('aria-pressed', 'false');
      converseButton.disabled = false;

      restoreConverseHeader();
      setState(null);
    }

    converseButton.addEventListener('click', () => {
      if (converseActive) endConverseSession();
      else startConverseSession();
    });

    window.addEventListener('beforeunload', () => {
      if (converseActive) {
        try { conversePc && conversePc.close(); } catch (_) {}
        try { converseMicStream && converseMicStream.getTracks().forEach(t => t.stop()); } catch (_) {}
      }
    });

    // Dismiss button for the art canvas
    (function wireArtDismiss() {
      const btn = document.getElementById('artDismiss');
      if (btn) btn.addEventListener('click', dismissArt);
    })();

    // Initial + polling
    fetchMemories();
    fetchEvents();
    setInterval(fetchEvents, 5000);
    setInterval(fetchMemories, 30000);
  </script>

  <!-- 3D neural orb (Three.js, vanilla module — no React) -->
  <script type="module">
    let THREE, EffectComposer, RenderPass, UnrealBloomPass, OutputPass;
    try {
      THREE = await import('three');
      ({ EffectComposer }   = await import('/lib/three/postprocessing/EffectComposer.js'));
      ({ RenderPass }       = await import('/lib/three/postprocessing/RenderPass.js'));
      ({ UnrealBloomPass }  = await import('/lib/three/postprocessing/UnrealBloomPass.js'));
      ({ OutputPass }       = await import('/lib/three/postprocessing/OutputPass.js'));
    } catch (err) {
      console.error('Three.js failed to load:', err);
      const bubble = document.getElementById('responseBubble');
      if (bubble && !bubble.textContent) {
        bubble.textContent = '3D orb failed to load: ' + (err && err.message || err);
      }
      throw err;
    }

    const canvas = document.getElementById('orbCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
    // Bright emissive materials + ACES tonemap so the bloom pass has
    // something punchy to bloom on.
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.95;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
    camera.position.set(0, 0, 8);

    // ── Post-processing: UnrealBloomPass for the photorealistic glow ──
    // Render → bloom → tonemap/output. Resolution is set in resize().
    const composer = new EffectComposer(renderer);
    const renderPass = new RenderPass(scene, camera);
