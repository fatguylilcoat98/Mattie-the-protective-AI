<!--
  Mattie — Protective AI Companion for Sandy Bankard
  Simple, calm, senior-friendly interface: plain chat + plain login.
  No background dashboards, no sci-fi panels.
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mattie</title>
  <script src="/lib/supabase.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f3efe7;
      color: #2b2b2b;
    }
    body { display: flex; flex-direction: column; height: 100dvh; }

    /* ---------- Login ---------- */
    .login-overlay {
      position: fixed; inset: 0;
      background: #f3efe7;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 50;
    }
    .login-overlay.hidden { display: none; }
    .login-card {
      width: 100%; max-width: 420px;
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 30px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      text-align: center;
    }
    .brand { font-size: 40px; font-weight: 700; color: #2f6f57; margin: 0 0 6px; }
    .tagline { font-size: 18px; color: #6b6b6b; margin: 0 0 28px; }
    .login-label {
      display: block; text-align: left; font-size: 17px;
      font-weight: 600; margin: 16px 0 6px;
    }
    .login-input {
      width: 100%; font-size: 20px; padding: 16px 18px;
      border: 2px solid #d6d0c4; border-radius: 12px;
      background: #fbfaf6; color: #2b2b2b;
    }
    .login-input:focus { outline: none; border-color: #2f6f57; }
    .login-btn {
      width: 100%; margin-top: 26px;
      font-size: 22px; font-weight: 700;
      padding: 18px; border: none; border-radius: 12px;
      background: #2f6f57; color: #fff; cursor: pointer;
    }
    .login-btn:hover:not(:disabled) { background: #275e49; }
    .login-btn:disabled { opacity: .6; cursor: not-allowed; }
    .login-msg { margin-top: 18px; font-size: 17px; min-height: 22px; }
    .login-msg.error { color: #b3261e; }
    .login-msg.ok { color: #2f6f57; }

    /* ---------- Chat ---------- */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 22px; background: #2f6f57; color: #fff;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 24px; margin: 0; font-weight: 700; }
    .signout {
      background: rgba(255,255,255,.18); color: #fff;
      border: none; border-radius: 10px;
      font-size: 16px; font-weight: 600; padding: 10px 16px; cursor: pointer;
    }
    .signout:hover { background: rgba(255,255,255,.3); }

    .messages {
      flex: 1; overflow-y: auto;
      padding: 24px 18px; display: flex; flex-direction: column; gap: 16px;
    }
    .bubble {
      max-width: 80%; font-size: 21px; line-height: 1.5;
      padding: 16px 20px; border-radius: 18px; white-space: pre-wrap;
      word-wrap: break-word;
    }
    .bubble.mattie {
      align-self: flex-start; background: #ffffff; color: #2b2b2b;
      border: 1px solid #e4ddcd;
    }
    .bubble.me {
      align-self: flex-end; background: #2f6f57; color: #fff;
    }
    .bubble.thinking { font-style: italic; color: #6b6b6b; }

    .composer {
      display: flex; gap: 12px; padding: 16px;
      background: #ece6da; flex-shrink: 0;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }
    .composer textarea {
      flex: 1; resize: none; font-family: inherit;
      font-size: 20px; padding: 16px 18px; max-height: 140px;
      border: 2px solid #d6d0c4; border-radius: 14px;
      background: #fff; color: #2b2b2b;
    }
    .composer textarea:focus { outline: none; border-color: #2f6f57; }
    .send-btn {
      font-size: 20px; font-weight: 700;
      padding: 0 26px; border: none; border-radius: 14px;
      background: #2f6f57; color: #fff; cursor: pointer;
    }
    .send-btn:hover:not(:disabled) { background: #275e49; }
    .send-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ---------- Voice conversation ---------- */
    .voicebar {
      background: #ece6da; padding: 0 16px 14px;
      display: flex; flex-direction: column; gap: 10px; flex-shrink: 0;
    }
    .voice-transcript {
      background: #fff; border: 1px solid #e4ddcd; border-radius: 14px;
      padding: 14px 16px; display: flex; flex-direction: column; gap: 8px;
    }
    .voice-line { font-size: 19px; line-height: 1.45; white-space: pre-wrap; }
    .voice-line:empty { display: none; }
    .voice-line.you    { color: #2b2b2b; font-weight: 600; }
    .voice-line.mattie { color: #2f6f57; }
    .voice-btn {
      width: 100%; font-size: 21px; font-weight: 700;
      padding: 18px; border: none; border-radius: 14px;
      background: #2f6f57; color: #fff; cursor: pointer;
    }
    .voice-btn:hover:not(:disabled) { background: #275e49; }
    .voice-btn:disabled { opacity: .6; cursor: not-allowed; }
    .voice-btn.active { background: #b3261e; }
    .voice-btn.active:hover { background: #93201a; }
    .voice-status {
      text-align: center; font-size: 16px; color: #6b6b6b; min-height: 20px;
    }

    @media (max-width: 480px) {
      .brand { font-size: 34px; }
      .bubble { font-size: 20px; max-width: 88%; }
      .voice-btn { font-size: 20px; }
    }
  </style>
</head>
<body>

  <!-- Login -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <p class="brand">Mattie</p>
      <p class="tagline">Your caring companion</p>
      <form id="loginForm">
        <label class="login-label" for="emailInput">Email</label>
        <input class="login-input" type="email" id="emailInput"
               autocomplete="username" required>
        <label class="login-label" for="passwordInput">Password</label>
        <input class="login-input" type="password" id="passwordInput"
               autocomplete="current-password" required>
        <button class="login-btn" id="loginButton" type="submit">Sign In</button>
      </form>
      <div class="login-msg" id="loginMsg"></div>
    </div>
  </div>

  <!-- Chat -->
  <div class="topbar">
    <h1>Mattie</h1>
    <button class="signout" id="signoutBtn" type="button">Sign out</button>
  </div>
  <div class="messages" id="messages"></div>

  <div class="voicebar">
    <div class="voice-transcript" id="voiceTranscript" hidden>
      <div class="voice-line you" id="voiceYou"></div>
      <div class="voice-line mattie" id="voiceMattie"></div>
    </div>
    <div class="voice-status" id="voiceStatus"></div>
    <button class="voice-btn" id="voiceBtn" type="button">&#127908;&nbsp; Talk with Mattie</button>
    <audio id="mattieAudio" autoplay playsinline hidden></audio>
  </div>

  <div class="composer">
    <textarea id="input" rows="1" placeholder="Type a message to Mattie…"></textarea>
    <button class="send-btn" id="sendBtn" type="button">Send</button>
  </div>

  <script>
    const { createClient } = supabase;
    const sb = createClient('__SUPABASE_URL__', '__SUPABASE_ANON_KEY__', {
      auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
    });

    const loginOverlay = document.getElementById('loginOverlay');
    const loginMsg = document.getElementById('loginMsg');
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('sendBtn');

    function showMsg(text, kind) {
      loginMsg.textContent = text;
      loginMsg.className = 'login-msg' + (kind ? ' ' + kind : '');
    }

    function addBubble(text, who, extraClass) {
      const div = document.createElement('div');
      div.className = 'bubble ' + who + (extraClass ? ' ' + extraClass : '');
      div.textContent = text;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return div;
    }

    async function authedFetch(url, options = {}) {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { showLogin(); throw new Error('Not signed in'); }
      const headers = new Headers(options.headers || {});
      headers.set('Authorization', 'Bearer ' + session.access_token);
      headers.set('Content-Type', 'application/json');
      let res = await fetch(url, { ...options, headers, credentials: 'same-origin' });
      if (res.status === 401) {
        const { data: { session: ns } } = await sb.auth.refreshSession();
        if (ns) {
          headers.set('Authorization', 'Bearer ' + ns.access_token);
          res = await fetch(url, { ...options, headers, credentials: 'same-origin' });
        }
      }
      return res;
    }

    function showLogin() {
      loginOverlay.classList.remove('hidden');
    }
    function hideLogin() {
      loginOverlay.classList.add('hidden');
    }

    function greet() {
      if (messagesEl.childElementCount === 0) {
        addBubble("Hi Sandy, I'm Mattie. I'm here whenever you'd like to talk. How are you doing today?", 'mattie');
      }
    }

    // ---- Login flow ----
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginButton');
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      btn.disabled = true; btn.textContent = 'Signing in…';
      showMsg('', '');
      try {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
        // Verify owner access against the backend.
        const test = await authedFetch('/api/oracle/memories/recent?limit=1');
        if (test.status === 403) {
          await sb.auth.signOut();
          showMsg('This account is not set up to use Mattie yet.', 'error');
          return;
        }
        if (!test.ok && test.status !== 404) {
          // 404 is fine (no memories endpoint data); anything else unexpected.
        }
        hideLogin();
        greet();
      } catch (err) {
        showMsg(err && err.message ? err.message : 'Sign in failed. Please try again.', 'error');
      } finally {
        btn.disabled = false; btn.textContent = 'Sign In';
      }
    });

    document.getElementById('signoutBtn').addEventListener('click', async () => {
      await sb.auth.signOut();
      messagesEl.innerHTML = '';
      showLogin();
    });

    // ---- Chat flow ----
    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      inputEl.value = '';
      inputEl.style.height = 'auto';
      addBubble(text, 'me');
      sendBtn.disabled = true;
      const thinking = addBubble('Mattie is thinking…', 'mattie', 'thinking');
      try {
        const res = await authedFetch('/api/enhanced/chat', {
          method: 'POST',
          body: JSON.stringify({
            message: text,
            include_memory: true,
            include_consciousness: true
          })
        });
        const data = await res.json().catch(() => ({}));
        const reply = data.response || data.message || "I'm sorry, I had trouble responding. Please try again.";
        thinking.classList.remove('thinking');
        thinking.textContent = reply;
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch (err) {
        thinking.classList.remove('thinking');
        thinking.textContent = "I'm sorry, something went wrong. Please try again in a moment.";
      } finally {
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });
    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
    });

    // ---- Voice conversation (OpenAI Realtime over WebRTC) ----
    const voiceBtn = document.getElementById('voiceBtn');
    const voiceTranscript = document.getElementById('voiceTranscript');
    const voiceYou = document.getElementById('voiceYou');
    const voiceMattie = document.getElementById('voiceMattie');
    const voiceStatus = document.getElementById('voiceStatus');
    const mattieAudio = document.getElementById('mattieAudio');

    let vActive = false, vPc = null, vDc = null, vMic = null;
    let vAssistantBuf = '';
    let vSessionId = null;

    function vSetStatus(t) { voiceStatus.textContent = t || ''; }

    async function writeTurn(payload) {
      const text = (payload.user_text || payload.assistant_text || '').trim();
      if (!text) return;
      try {
        await authedFetch('/api/converse/turn', {
          method: 'POST',
          body: JSON.stringify({
            user_text: payload.user_text || '',
            assistant_text: payload.assistant_text || '',
            session_id: vSessionId
          })
        });
      } catch (_) {}
    }

    function handleVoiceEvent(evt) {
      if (!evt || !evt.type) return;
      switch (evt.type) {
        case 'input_audio_buffer.speech_started':
          vSetStatus('Listening…'); break;
        case 'input_audio_buffer.speech_stopped':
          vSetStatus('Thinking…'); break;
        case 'conversation.item.input_audio_transcription.completed': {
          const t = (evt.transcript || '').trim();
          if (t) { voiceYou.textContent = t; writeTurn({ user_text: t }); }
          break;
        }
        case 'response.audio_transcript.delta':
        case 'response.output_audio_transcript.delta':
        case 'response.output_text.delta': {
          const chunk = evt.delta || (evt.text && evt.text.delta) || '';
          if (chunk) {
            vAssistantBuf += chunk;
            voiceMattie.textContent = vAssistantBuf;
            vSetStatus('Mattie is speaking…');
          }
          break;
        }
        case 'response.audio_transcript.done':
        case 'response.output_audio_transcript.done':
        case 'response.output_text.done': {
          const finalText = (evt.transcript || evt.text || vAssistantBuf || '').trim();
          if (finalText) { voiceMattie.textContent = finalText; writeTurn({ assistant_text: finalText }); }
          vAssistantBuf = '';
          break;
        }
        case 'response.done':
          vSetStatus('Listening…'); break;
        case 'error':
          vSetStatus('Voice connection error.');
          endVoice();
          break;
      }
    }

    async function startVoice() {
      if (vActive) return;
      voiceBtn.disabled = true;
      vSetStatus('Connecting…');
      let tokenData;
      try {
        const res = await authedFetch('/api/converse/token', { method: 'POST', body: '{}' });
        if (!res.ok) {
          vSetStatus(res.status === 403
            ? 'Voice conversation is not available on this account.'
            : 'Voice service is unavailable right now.');
          voiceBtn.disabled = false;
          return;
        }
        tokenData = await res.json();
      } catch (_) {
        vSetStatus('Network problem. Please try again.');
        voiceBtn.disabled = false;
        return;
      }

      vSessionId = (crypto && crypto.randomUUID) ? crypto.randomUUID() : ('cv-' + Date.now());

      try {
        vMic = await navigator.mediaDevices.getUserMedia({ audio: true });
      } catch (_) {
        vSetStatus('Please allow the microphone, then tap again.');
        voiceBtn.disabled = false;
        return;
      }

      const pc = new RTCPeerConnection();
      vPc = pc;
      pc.ontrack = (e) => {
        if (e && e.streams && e.streams[0]) mattieAudio.srcObject = e.streams[0];
      };
      vMic.getTracks().forEach(t => pc.addTrack(t, vMic));

      const dc = pc.createDataChannel('oai-events');
      vDc = dc;
      dc.onopen = () => {
        const instructions = tokenData.instructions ||
          "You are Mattie, a warm, protective AI companion for Sandy. " +
          "Speak gently, naturally and concisely — this is a live voice " +
          "conversation. Short, kind sentences. Never alarm her. " +
          "Help keep her safe from scams without being condescending.";
        try {
          dc.send(JSON.stringify({
            type: 'session.update',
            session: {
              type: 'realtime',
              instructions,
              audio: {
                input: {
                  transcription: { model: 'gpt-4o-mini-transcribe' },
                  turn_detection: { type: 'semantic_vad' }
                },
                output: { voice: tokenData.voice || 'shimmer' }
              }
            }
          }));
        } catch (_) {}
      };
      dc.onmessage = (e) => { try { handleVoiceEvent(JSON.parse(e.data)); } catch (_) {} };

      try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        const sdpRes = await fetch(
          'https://api.openai.com/v1/realtime/calls?model=' +
            encodeURIComponent(tokenData.model || 'gpt-realtime'),
          {
            method: 'POST',
            headers: {
              Authorization: 'Bearer ' + tokenData.token,
              'Content-Type': 'application/sdp'
            },
            body: offer.sdp
          }
        );
        if (!sdpRes.ok) { vSetStatus('Could not start the voice call.'); await endVoice(); return; }
        const answerSdp = await sdpRes.text();
        await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });
      } catch (_) {
        vSetStatus('Could not start the voice call.');
        await endVoice();
        return;
      }

      vActive = true;
      voiceBtn.disabled = false;
      voiceBtn.classList.add('active');
      voiceBtn.innerHTML = '&#9209;&nbsp; End conversation';
      voiceTranscript.hidden = false;
      voiceYou.textContent = '';
      voiceMattie.textContent = '';
      vSetStatus('Listening… just start talking.');
    }

    async function endVoice() {
      if (!vActive && !vPc && !vMic) { voiceBtn.disabled = false; return; }
      vActive = false;
      const tail = vAssistantBuf.trim();
      if (tail) { await writeTurn({ assistant_text: tail }).catch(() => {}); }
      vAssistantBuf = '';
      try { if (vDc) vDc.close(); } catch (_) {}
      vDc = null;
      try { if (vPc) vPc.close(); } catch (_) {}
      vPc = null;
      try { if (vMic) vMic.getTracks().forEach(t => t.stop()); } catch (_) {}
      vMic = null;
      try { mattieAudio.srcObject = null; } catch (_) {}
      vSessionId = null;
      voiceTranscript.hidden = true;
      voiceYou.textContent = '';
      voiceMattie.textContent = '';
      voiceBtn.classList.remove('active');
      voiceBtn.innerHTML = '&#127908;&nbsp; Talk with Mattie';
      voiceBtn.disabled = false;
      vSetStatus('');
    }

    voiceBtn.addEventListener('click', () => { vActive ? endVoice() : startVoice(); });
    window.addEventListener('beforeunload', () => {
      if (vActive) {
        try { vPc && vPc.close(); } catch (_) {}
        try { vMic && vMic.getTracks().forEach(t => t.stop()); } catch (_) {}
      }
    });

    // ---- Session restore ----
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) { hideLogin(); greet(); }
      else { showLogin(); }
    })();
  </script>
</body>
</html>
