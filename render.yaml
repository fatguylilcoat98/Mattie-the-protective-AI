# Lylo Companion — Render service configuration

services:
  - type: web
    name: splendor
    env: node
    plan: starter
    buildCommand: npm install && npm run build:react
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX
        value: splendor-memory
      - key: TAVILY_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false

  # Background reflection worker (every 6 hours)
  - type: cron
    name: splendor-reflection
    env: node
    schedule: "0 */6 * * *"   # every 6 hours
    buildCommand: npm install
    startCommand: node workers/reflection-worker.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # Memory tier maintenance — daily decay (episodic → compressed prep)
  - type: cron
    name: splendor-memory-decay
    env: node
    schedule: "0 4 * * *"     # 04:00 UTC daily
    buildCommand: npm install
    startCommand: node workers/memory-decay-worker.js
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false

  # Memory tier maintenance — compression (folds decayed episodes into summaries)
  - type: cron
    name: splendor-memory-compression
    env: node
    schedule: "30 4 * * *"    # 04:30 UTC daily, 30 min after decay
    buildCommand: npm install
    startCommand: node workers/memory-compression-worker.js
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
